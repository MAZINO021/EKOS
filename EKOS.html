*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  font-family:var(--sans); color:var(--ink); background:var(--forest-900);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow:hidden;
}
/* nature backdrop layered with calm overlay */
#bg-layer{position:fixed; inset:0; z-index:0;
  background:
    linear-gradient(180deg, rgba(12,31,19,.30), rgba(12,31,19,.10) 30%, rgba(12,31,19,.42)),
    var(--bg-image, none),
    radial-gradient(1200px 700px at 75% 10%, #2a5a3a, transparent 60%),
    linear-gradient(160deg,#173a23,#0c1f13);
  background-size:cover; background-position:center; background-repeat:no-repeat;
}
#bg-grain{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.05;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
#app{position:relative; z-index:1; height:100%;}
button{font-family:inherit; cursor:pointer;}
::-webkit-scrollbar{width:11px; height:11px;}
::-webkit-scrollbar-thumb{background:rgba(44,107,62,.32); border-radius:20px; border:3px solid transparent; background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:rgba(44,107,62,.5); background-clip:padding-box;}
::-webkit-scrollbar-track{background:transparent;}
.hide{display:none !important;}
.serif{font-family:var(--serif);}
.gold{color:var(--gold-700);}

/* ---------- generic buttons / chips ---------- */
.btn{display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line-strong);
  background:var(--glass-strong); color:var(--ink); padding:9px 16px; border-radius:999px;
  font-size:14px; font-weight:600; transition:.18s; backdrop-filter:blur(8px);}
.btn:hover{border-color:var(--green-500); color:var(--green-600); transform:translateY(-1px); box-shadow:var(--shadow-soft);}
.btn.primary{background:linear-gradient(180deg,var(--green-500),var(--green-600)); color:#fff; border-color:transparent;}
.btn.primary:hover{color:#fff; filter:brightness(1.06);}
.btn.gold{background:linear-gradient(180deg,var(--gold-400),var(--gold)); color:#3a2e08; border-color:transparent;}
.btn.gold:hover{color:#3a2e08;}
.btn.ghost{background:transparent; border-color:transparent; color:var(--ink-soft);}
.btn.ghost:hover{background:rgba(255,255,255,.4);}
.btn.sm{padding:6px 12px; font-size:13px;}
.icon-btn{display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:50%;
  border:1px solid var(--line); background:var(--glass); transition:.18s;}
.icon-btn:hover{border-color:var(--green-500); color:var(--green-600); transform:translateY(-1px);}
.lang-switch{display:inline-flex; border:1px solid var(--line-strong); border-radius:999px; overflow:hidden; background:var(--glass); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);}
.lang-switch button{border:none; background:none; padding:7px 14px; font-size:13px; font-weight:700; color:var(--ink-soft); transition:.15s; min-width:42px;}
.lang-switch button.on{background:linear-gradient(180deg,var(--green-500),var(--green-600)); color:#fff;}
.lang-switch button:not(.on):hover{background:rgba(60,138,82,.12); color:var(--green-600);}
.lang-switch.dark{border-color:rgba(255,255,255,.45); background:rgba(255,255,255,.16);}
.lang-switch.dark button{color:#f4f1e6;}
.lang-switch.dark button.on{background:linear-gradient(180deg,var(--gold-400),var(--gold)); color:#3a2e08;}
.pill{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; letter-spacing:.04em;
  text-transform:uppercase; padding:4px 10px; border-radius:999px;}

/* ============================================================= *
 *  HOME (Layer 1) — search first
 * ============================================================= */
#view-home{height:100%; overflow:auto; display:flex; flex-direction:column; align-items:center;}
.home-inner{width:min(920px,92vw); margin:auto; padding:6vh 0 8vh; text-align:center;}
.home-eyebrow{color:var(--gold-200); letter-spacing:.42em; font-size:12px; text-transform:uppercase; font-weight:700;
  text-shadow:0 1px 14px rgba(0,0,0,.5);}
.home-title{font-family:var(--serif); color:#fff; font-size:clamp(40px,7vw,76px); line-height:1.02; margin:14px 0 6px;
  font-weight:600; text-shadow:0 4px 28px rgba(0,0,0,.55);}
.home-title em{color:var(--gold-400); font-style:normal;}
.home-sub{color:rgba(247,243,233,.92); font-size:clamp(15px,2vw,18px); max-width:620px; margin:0 auto 38px;
  text-shadow:0 2px 16px rgba(0,0,0,.5);}
.home-search{position:relative; width:min(760px,92vw); margin:0 auto;}
.home-search input{width:100%; font-size:19px; padding:22px 60px 22px 60px; border-radius:999px;
  border:1px solid rgba(255,255,255,.5); background:var(--glass-strong); color:var(--ink);
  box-shadow:0 24px 70px -22px rgba(0,0,0,.7); outline:none; transition:.2s; font-family:var(--sans);}
.home-search input:focus{border-color:var(--gold-400); box-shadow:0 24px 80px -18px rgba(0,0,0,.75), 0 0 0 4px rgba(216,182,100,.28);}
.home-search .si{position:absolute; left:24px; top:50%; transform:translateY(-50%); font-size:22px; opacity:.6;}
.home-search .sk{position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--muted);
  border:1px solid var(--line); border-radius:6px; padding:3px 8px; background:rgba(255,255,255,.6);}
.home-actions{margin-top:26px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
.home-section{width:min(900px,92vw); margin:42px auto 0; text-align:left;}
.home-section h2{font-family:var(--serif); color:#fff; font-size:20px; margin:0 0 14px; display:flex; align-items:center; gap:10px;
  text-shadow:0 2px 14px rgba(0,0,0,.5);}
.home-section h2 .c{color:var(--gold-300,var(--gold-200)); font-size:13px; font-weight:600; opacity:.85;}
.card-row{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px;}
.kcard{background:var(--glass); border:1px solid rgba(255,255,255,.45); border-radius:var(--radius);
  padding:16px 16px 14px; text-align:left; transition:.18s; backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-soft), var(--glass-edge); display:flex; flex-direction:column; gap:6px;}
.kcard:hover{transform:translateY(-3px); border-color:var(--green-500); box-shadow:var(--shadow);}
.kcard .kc-top{display:flex; align-items:center; gap:8px;}
.kcard .kc-ico{font-size:20px;}
.kcard .kc-title{font-weight:700; color:var(--ink); font-size:15px;}
.kcard .kc-path{font-size:12px; color:var(--muted); line-height:1.5;}
.kcard .kc-meta{font-size:11px; color:var(--green-600); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
.empty-hint{color:rgba(247,243,233,.8); font-size:14px; background:var(--glass-dark); border:1px dashed rgba(255,255,255,.3);
  padding:14px 18px; border-radius:var(--radius); backdrop-filter:blur(6px);}

/* ============================================================= *
 *  APP SHELL (Layer 2) — split screen
 * ============================================================= */
#view-app{height:100%; display:flex; flex-direction:column;}
.topbar{display:flex; align-items:center; gap:14px; padding:10px 16px; background:var(--glass);
  border-bottom:1px solid var(--line-strong); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); z-index:5;
  box-shadow:0 6px 20px -16px rgba(0,0,0,.45), var(--glass-edge);}
.brand{display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;}
.brand .logo{width:34px; height:34px; border-radius:10px; display:grid; place-items:center; color:#fff; font-weight:800;
  background:radial-gradient(circle at 30% 25%,var(--green-400),var(--green-600)); box-shadow:inset 0 0 0 1px rgba(255,255,255,.25), var(--shadow-soft); font-family:var(--serif);}
.brand .bt{font-family:var(--serif); font-weight:700; font-size:18px; color:var(--forest-800);}
.brand .bt small{display:block; font-family:var(--sans); font-weight:600; font-size:10px; letter-spacing:.22em; color:var(--gold-700); text-transform:uppercase;}
.topbar .grow{flex:1;}
.topsearch{position:relative; flex:1; max-width:560px;}
.topsearch input{width:100%; padding:10px 14px 10px 38px; border-radius:999px; border:1px solid var(--line-strong);
  background:var(--paper); outline:none; font-size:14px; transition:.18s;}
.topsearch input:focus{border-color:var(--green-500); box-shadow:0 0 0 3px rgba(60,138,82,.18);}
.topsearch .si{position:absolute; left:14px; top:50%; transform:translateY(-50%); opacity:.5;}

.split{flex:1; display:flex; min-height:0;}
/* left tree */
.tree-panel{width:340px; min-width:200px; max-width:620px; display:flex; flex-direction:column;
  background:var(--glass); border-right:1px solid var(--line-strong); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); box-shadow:var(--glass-edge); min-height:0;}
.tree-head{display:flex; align-items:center; justify-content:space-between; padding:12px 14px 8px;}
.tree-head h3{margin:0; font-family:var(--serif); font-size:15px; color:var(--forest-800); display:flex; gap:8px; align-items:center;}
.tree-scroll{flex:1; overflow:auto; padding:4px 8px 18px;}
.tnode{user-select:none;}
.trow{display:flex; align-items:center; gap:4px; padding:5px 8px; border-radius:9px; cursor:pointer; font-size:14px; color:var(--ink-soft);
  transition:background .12s, color .12s; position:relative;}
.trow:hover{background:rgba(60,138,82,.1);}
.trow.active{background:linear-gradient(90deg,rgba(60,138,82,.2),rgba(60,138,82,.06)); color:var(--forest-800); font-weight:700;
  box-shadow:inset 3px 0 0 var(--green-500);}
.trow .caret{width:16px; text-align:center; font-size:10px; color:var(--muted); transition:transform .15s; flex:none;}
.trow .caret.open{transform:rotate(90deg);}
.trow .tico{width:18px; text-align:center; flex:none; font-size:14px;}
.trow .tlabel{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.trow .tstar{opacity:0; font-size:12px; flex:none;}
.trow:hover .tstar{opacity:.5;}
.trow .tstar.on{opacity:1; color:var(--gold);}
.tchildren{margin-left:14px; border-left:1px solid var(--line); padding-left:2px;}
.tree-foot{padding:8px 12px; border-top:1px solid var(--line); display:flex; gap:8px;}

/* resizer */
.resizer{width:6px; cursor:col-resize; background:transparent; flex:none; position:relative; z-index:4;}
.resizer:hover::after,.resizer.drag::after{content:""; position:absolute; inset:0 2px; background:var(--green-500); border-radius:3px; opacity:.5;}

/* right detail */
.detail{flex:1; min-width:0; overflow:auto; background:var(--glass); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);}
.detail-inner{max-width:1000px; margin:0 auto; padding:18px 30px 80px;}
.crumbs{display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:13px; color:var(--muted); margin-bottom:10px;}
.crumbs a{color:var(--green-600); cursor:pointer; text-decoration:none; font-weight:600;}
.crumbs a:hover{text-decoration:underline;}
.crumbs .sep{opacity:.5;}
.topic-head{display:flex; align-items:flex-start; gap:14px; margin-bottom:6px;}
.topic-head .th-ico{font-size:34px; line-height:1;}
.topic-title{font-family:var(--serif); font-size:clamp(26px,3.4vw,38px); color:var(--forest-900); margin:0; font-weight:600; flex:1;
  outline:none; border-radius:8px;}
.topic-title:focus{background:rgba(60,138,82,.08);}
.topic-actions{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.autosave{font-size:12px; color:var(--green-600); display:inline-flex; align-items:center; gap:6px; opacity:0; transition:.2s;}
.autosave.show{opacity:1;}
.autosave .dot{width:7px; height:7px; border-radius:50%; background:var(--green-500);}

/* tabs */
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin:16px 0 0; flex-wrap:wrap;}
.tab{padding:10px 16px; font-size:14px; font-weight:600; color:var(--muted); border:none; background:none; border-bottom:2px solid transparent;
  display:inline-flex; gap:7px; align-items:center; transition:.15s;}
.tab:hover{color:var(--forest-800);}
.tab.active{color:var(--green-600); border-bottom-color:var(--green-600);}
.tab .badge{font-size:11px; background:rgba(60,138,82,.15); color:var(--green-600); border-radius:999px; padding:1px 7px; font-weight:700;}
.tabpane{padding:22px 2px;}

/* overview structured */
.struct{display:grid; gap:14px;}
.sblock{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow-soft);}
.sblock h4{margin:0 0 8px; font-family:var(--serif); color:var(--forest-700); font-size:16px; display:flex; align-items:center; gap:8px;}
.sblock h4 .ic{color:var(--gold);}
.sblock .sbody{font-size:15px; line-height:1.7; color:var(--ink-soft); outline:none; border-radius:8px; min-height:24px;}
.sblock .sbody:focus{background:rgba(60,138,82,.06);}
.sblock .sbody[data-empty]:empty::before{content:attr(data-empty); color:var(--muted); font-style:italic;}
.sblock ul{margin:6px 0 0; padding-left:20px;} .sblock li{margin:4px 0;}
.evidence{display:flex; flex-direction:column; gap:8px;}
.evidence .ev{display:flex; gap:10px; align-items:flex-start; font-size:14px; line-height:1.6; padding:8px 10px; background:rgba(60,138,82,.07);
  border-radius:10px; border-left:3px solid var(--green-500);}
.section-label{font-family:var(--sans); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-700); font-weight:700; margin:26px 0 12px;}
.custom-area{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:8px; box-shadow:var(--shadow-soft);}
.rt-toolbar{display:flex; gap:2px; flex-wrap:wrap; padding:6px; border-bottom:1px solid var(--line); margin-bottom:6px; position:sticky; top:0; background:var(--paper); z-index:2; border-radius:12px 12px 0 0;}
.rt-toolbar button{border:none; background:none; width:32px; height:30px; border-radius:7px; color:var(--ink-soft); font-size:14px;}
.rt-toolbar button:hover{background:rgba(60,138,82,.12); color:var(--green-600);}
.rt-toolbar .div{width:1px; background:var(--line); margin:4px 3px;}
.rt-content{padding:12px 14px; min-height:160px; outline:none; font-size:15px; line-height:1.75; color:var(--ink);}
.rt-content:focus{box-shadow:inset 0 0 0 2px rgba(60,138,82,.18); border-radius:10px;}
.rt-content[data-empty]:empty::before{content:attr(data-empty); color:var(--muted); font-style:italic;}
.rt-content h1,.rt-content h2,.rt-content h3{font-family:var(--serif); color:var(--forest-800);}
.rt-content table{border-collapse:collapse; width:100%; margin:10px 0;}
.rt-content td,.rt-content th{border:1px solid var(--line-strong); padding:7px 10px;}
.rt-content blockquote{border-left:3px solid var(--gold); margin:10px 0; padding:4px 14px; color:var(--ink-soft); background:rgba(195,154,60,.08);}
.rt-content img{max-width:100%; border-radius:10px;}
.rt-content ul[data-check]{list-style:none; padding-left:6px;}
.rt-content ul[data-check] li::before{content:"☐ "; color:var(--green-600);}

/* appears-in / threads box */
.aside-box{margin-top:22px; background:var(--glass); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px;}
.aside-box h4{margin:0 0 10px; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-700); font-weight:700;}
.appears{display:flex; flex-wrap:wrap; gap:8px;}
.appears a{font-size:13px; color:var(--ink-soft); background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:5px 12px; cursor:pointer; transition:.15s;}
.appears a:hover{border-color:var(--green-500); color:var(--green-600);}

/* documents / files lists */
.file-list{display:flex; flex-direction:column; gap:8px;}
.file-row{display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--paper); border:1px solid var(--line);
  border-radius:12px; transition:.15s; cursor:pointer;}
.file-row:hover{border-color:var(--green-500); box-shadow:var(--shadow-soft); transform:translateX(2px);}
.file-row .fico{font-size:24px;} .file-row .fname{font-weight:600; flex:1;} .file-row .fmeta{font-size:12px; color:var(--muted);}
.gallery{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
.thumb{aspect-ratio:1; border-radius:12px; overflow:hidden; border:1px solid var(--line); cursor:pointer; position:relative; background:#eee;}
.thumb img{width:100%; height:100%; object-fit:cover; transition:.25s;}
.thumb:hover img{transform:scale(1.06);}
.thumb .cap{position:absolute; left:0; right:0; bottom:0; padding:6px 8px; font-size:11px; color:#fff; background:linear-gradient(transparent,rgba(0,0,0,.7));}
.video-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;}
.video-card{background:var(--paper); border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:var(--shadow-soft);}
.video-card .vframe{aspect-ratio:16/9; background:#000;} .video-card iframe,.video-card video{width:100%; height:100%; border:0; display:block;}
.video-card .vt{padding:10px 12px; font-weight:600; font-size:14px;}
.notes-list{display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
.note{background:rgba(255,255,250,.7); border:1px solid var(--line); border-radius:14px; padding:14px; box-shadow:var(--shadow-soft), var(--glass-edge); display:flex; flex-direction:column; gap:6px; min-height:120px;}
.note .nkind{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gold-700);}
.note .ntitle{font-family:var(--serif); font-size:16px; color:var(--forest-800); outline:none;}
.note .nbody{font-size:14px; line-height:1.6; color:var(--ink-soft); outline:none; flex:1;}
.note .nfoot{display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--muted);}
.dropzone{border:2px dashed var(--line-strong); border-radius:14px; padding:26px; text-align:center; color:var(--muted); background:rgba(255,255,255,.4); transition:.15s;}
.dropzone.drag{border-color:var(--green-500); background:rgba(60,138,82,.08); color:var(--green-600);}

/* search results overlay */
#search-overlay{position:absolute; inset:0; z-index:20; display:none;}
#search-overlay.open{display:block;}
.search-scrim{position:absolute; inset:0; background:rgba(12,31,19,.35); backdrop-filter:blur(3px);}
.search-panel{position:absolute; left:50%; top:64px; transform:translateX(-50%); width:min(740px,94vw); max-height:74vh; overflow:auto;
  background:var(--glass); border:1px solid var(--line-strong); border-radius:var(--radius-lg);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); box-shadow:var(--shadow), var(--glass-edge); padding:10px;}
.search-result{display:flex; gap:12px; padding:12px 14px; border-radius:12px; cursor:pointer; align-items:flex-start;}
.search-result:hover,.search-result.kbd{background:rgba(60,138,82,.12);}
.search-result .ri{font-size:22px;}
.search-result .rt{font-weight:700; color:var(--forest-800); display:flex; align-items:center; gap:8px;}
.search-result .rp{font-size:12px; color:var(--muted); margin-top:3px;}
.search-result .rp b{color:var(--green-600); font-weight:700;}
.search-result .rs{font-size:13px; color:var(--ink-soft); margin-top:4px; line-height:1.5;}
.search-result mark{background:rgba(216,182,100,.5); color:inherit; border-radius:3px; padding:0 2px;}
.search-tree-path{display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:4px;}
.search-tree-path span{font-size:12px;}
.res-cat{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-700); font-weight:700; padding:10px 14px 4px;}

/* ============================================================= *
 *  THREAD EXPLORER (Layer 3)
 * ============================================================= */
#view-threads{position:fixed; inset:0; z-index:40; display:none; background:radial-gradient(1400px 900px at 50% 40%,#16361f,#0a190f);}
#view-threads.open{display:block;}
#thread-canvas{position:absolute; inset:0; width:100%; height:100%; display:block; cursor:grab;}
#thread-canvas:active{cursor:grabbing;}
.thr-top{position:absolute; top:0; left:0; right:0; padding:16px 22px; display:flex; align-items:center; gap:16px; z-index:2;
  background:linear-gradient(180deg,rgba(10,25,15,.75),transparent); pointer-events:none;}
.thr-top > *{pointer-events:auto;}
.thr-title{font-family:var(--serif); color:#fff; font-size:20px;}
.thr-title small{display:block; font-family:var(--sans); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold-400);}
.thr-legend{position:absolute; bottom:22px; left:22px; z-index:2; background:rgba(10,25,15,.6); border:1px solid rgba(255,255,255,.14);
  border-radius:14px; padding:12px 16px; color:#e7efe3; backdrop-filter:blur(8px); font-size:13px;}
.thr-legend .lg{display:flex; align-items:center; gap:8px; margin:5px 0;}
.thr-legend .sw{width:22px; height:3px; border-radius:2px;}
.thr-help{position:absolute; bottom:22px; right:22px; z-index:2; color:rgba(231,239,227,.7); font-size:12px; text-align:right; line-height:1.7;}
.thr-focus-card{position:absolute; top:74px; left:22px; z-index:2; width:300px; background:rgba(255,255,255,.66); border-radius:16px;
  padding:16px 18px; box-shadow:var(--shadow), var(--glass-edge); border:1px solid rgba(255,255,255,.4);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);}
.thr-focus-card h3{font-family:var(--serif); margin:0 0 6px; color:var(--forest-900);}
.thr-focus-card p{font-size:13px; color:var(--ink-soft); line-height:1.6; margin:0 0 10px;}
.thr-focus-card .links{display:flex; flex-direction:column; gap:4px; max-height:30vh; overflow:auto;}
.thr-focus-card .lk{display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; border-radius:8px; cursor:pointer;}
.thr-focus-card .lk:hover{background:rgba(60,138,82,.12);}
.thr-focus-card .lk .d{width:9px; height:9px; border-radius:50%; flex:none;}

/* ============================================================= *
 *  MODALS / TOAST
 * ============================================================= */
#modal-root{position:fixed; inset:0; z-index:60; display:none;}
#modal-root.open{display:block;}
.scrim{position:absolute; inset:0; background:rgba(12,31,19,.5); backdrop-filter:blur(4px);}
.modal{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(680px,94vw); max-height:88vh; overflow:auto;
  background:var(--glass); border:1px solid var(--line-strong); border-radius:var(--radius-lg);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); box-shadow:var(--shadow), var(--glass-edge); padding:26px 28px;}
.modal h2{font-family:var(--serif); margin:0 0 4px; color:var(--forest-900); font-size:24px;}
.modal .msub{color:var(--muted); font-size:14px; margin:0 0 18px;}
.modal label{display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin:14px 0 5px;}
.modal input[type=text],.modal input[type=password],.modal select,.modal textarea{width:100%; padding:11px 13px; border:1px solid var(--line-strong);
  border-radius:10px; background:var(--paper); font-size:14px; outline:none; font-family:inherit;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--green-500); box-shadow:0 0 0 3px rgba(60,138,82,.16);}
.modal .row{display:flex; gap:10px; justify-content:flex-end; margin-top:22px;}
.modal-close{position:absolute; top:14px; right:14px;}
/* image viewer */
#viewer{position:fixed; inset:0; z-index:70; display:none; background:rgba(8,18,11,.92);}
#viewer.open{display:flex; align-items:center; justify-content:center;}
#viewer img{max-width:88vw; max-height:84vh; border-radius:8px; box-shadow:0 30px 80px rgba(0,0,0,.6); transition:transform .15s;}
#viewer .vbtn{position:absolute; top:50%; transform:translateY(-50%); width:54px; height:54px; border-radius:50%; background:rgba(255,255,255,.12);
  color:#fff; border:1px solid rgba(255,255,255,.25); font-size:22px;}
#viewer .vbtn:hover{background:rgba(255,255,255,.22);}
#viewer .prev{left:24px;} #viewer .next{right:24px;}
#viewer .vclose{top:24px; right:24px; transform:none;}
#viewer .vzoom{bottom:24px; left:50%; transform:translateX(-50%); top:auto; display:flex; gap:8px;}
#viewer .vzoom .vbtn{position:static; transform:none; width:44px; height:44px; font-size:18px;}
#viewer .vcap{position:absolute; bottom:24px; right:24px; color:#fff; font-size:13px; opacity:.8;}

/* ingestion pipeline visual */
.pipeline{display:flex; flex-direction:column; gap:6px; margin:14px 0;}
.pstep{display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:10px; background:var(--paper); border:1px solid var(--line);
  font-size:14px; transition:.2s; opacity:.5;}
.pstep.active{opacity:1; border-color:var(--green-500); box-shadow:0 0 0 3px rgba(60,138,82,.12);}
.pstep.done{opacity:1; border-color:rgba(60,138,82,.4);}
.pstep .pn{width:24px; height:24px; border-radius:50%; background:var(--sage-100); color:var(--green-600); display:grid; place-items:center; font-weight:700; font-size:12px; flex:none;}
.pstep.done .pn{background:var(--green-500); color:#fff;}
.pstep.active .pn{background:var(--gold); color:#fff;}
.proposal{border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin:8px 0; background:var(--paper);}
.proposal .ph{display:flex; align-items:center; gap:10px;}
.proposal .ph b{font-family:var(--serif); font-size:16px; color:var(--forest-800); flex:1;}
.proposal .place{font-size:12px; color:var(--muted); margin-top:4px;}
.proposal .place b{color:var(--green-600);}
.simbar{height:6px; border-radius:4px; background:var(--line); overflow:hidden; margin:6px 0;}
.simbar > i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),var(--green-500));}

#toast-root{position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:90; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{background:var(--forest-800); color:#f4f1e6; padding:11px 18px; border-radius:999px; font-size:14px; box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.12); animation:tin .25s ease; display:flex; align-items:center; gap:9px;}
.toast .tx{color:var(--gold-400);}
@keyframes tin{from{opacity:0; transform:translateY(10px);}}

@media (max-width:780px){
  .tree-panel{position:absolute; z-index:6; height:100%; box-shadow:var(--shadow);}
  .detail-inner{padding:16px;}
}

/* ---- Phase 4: Knowledge Core UI (blocks / citations / principles / sources) ---- */
.kb-list{display:flex; flex-direction:column; gap:10px;}
.kb-card{background:var(--paper); border:1px solid var(--line); border-left:3px solid var(--green-500); border-radius:12px; padding:12px 14px; box-shadow:var(--shadow-soft), var(--glass-edge);}
.kb-top{display:flex; align-items:center; gap:10px; font-size:11px;}
.kb-type{text-transform:uppercase; letter-spacing:.08em; font-weight:700; color:var(--gold-700); background:rgba(195,154,60,.14); padding:2px 8px; border-radius:999px;}
.kb-conf{font-weight:700;}
.kb-origin{font-size:11px; color:var(--muted);}
.kb-statement{font-size:15px; line-height:1.6; color:var(--ink); margin:8px 0 4px; outline:none; border-radius:6px;}
.kb-statement:focus{background:rgba(60,138,82,.07);}
.kb-evs{display:flex; flex-direction:column; gap:5px; margin:6px 0;}
.kb-ev{font-size:13px; color:var(--ink-soft); line-height:1.5; padding:5px 9px; background:rgba(60,138,82,.07); border-radius:8px;}
.kb-chips{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-top:8px;}
.cite{display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--green-700,#2c6b3e); background:rgba(60,138,82,.12); border:1px solid rgba(60,138,82,.25); border-radius:999px; padding:3px 9px; cursor:pointer; transition:.15s;}
.cite:hover{background:rgba(60,138,82,.2);}
.prin-chip{display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--gold-700); background:rgba(195,154,60,.14); border:1px solid rgba(195,154,60,.32); border-radius:999px; padding:3px 9px; cursor:pointer; transition:.15s;}
.prin-chip:hover{background:rgba(195,154,60,.24);}
.kb-add{font-size:12px; color:var(--muted); background:none; border:1px dashed var(--line-strong); border-radius:999px; padding:3px 9px; transition:.15s;}
.kb-add:hover{color:var(--green-600); border-color:var(--green-500);}
.kb-confsel{font-size:11px; border:1px solid var(--line); border-radius:8px; background:var(--paper); color:var(--ink-soft); padding:2px 4px; margin-left:auto;}
.src-list{display:flex; flex-direction:column; gap:6px;}
.src-row{display:flex; align-items:center; gap:9px; font-size:14px;}
.src-title{flex:1; cursor:pointer; color:var(--ink-soft); border-bottom:1px dashed transparent;}
.src-title:hover{color:var(--green-600); border-bottom-color:var(--green-500);}

/* ---- Phase 5: Review Center / proposals ---- */
.review-badge{position:absolute; top:-3px; right:-3px; min-width:17px; height:17px; padding:0 4px; border-radius:9px; background:#c0392b; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 2px var(--glass);}
.rv-stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:6px 0 4px;}
.rv-stat{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow-soft), var(--glass-edge);}
.rv-num{font-family:var(--serif); font-size:30px; font-weight:700; line-height:1;}
.rv-lbl{font-size:12px; color:var(--muted); margin-top:4px;}
.rv-card{background:var(--paper); border:1px solid var(--line); border-left:3px solid var(--green-500); border-radius:12px; padding:13px 15px; margin:10px 0; box-shadow:var(--shadow-soft), var(--glass-edge);}
.rv-statement{font-size:15px; line-height:1.6; color:var(--ink); margin:8px 0 4px; font-weight:500;}
.rv-meta{font-size:12px; color:var(--muted);}
.rv-warn{font-size:13px; margin:7px 0; padding:6px 10px; border-radius:8px;}
.rv-warn.dup{background:rgba(154,122,35,.12); color:var(--gold-700);}
.rv-warn.conf{background:rgba(201,135,31,.14); color:#9a5b16;}
.rv-conf{display:flex; flex-wrap:wrap; gap:10px; margin:8px 0 4px;}
.cbar{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); min-width:150px; flex:1;}
.cbar span{width:74px;} .cbar i{flex:1; height:6px; background:var(--line); border-radius:4px; overflow:hidden;} .cbar i b{display:block; height:100%; background:linear-gradient(90deg,var(--gold),var(--green-500));} .cbar em{font-style:normal; width:30px; text-align:right;}
.rv-reason{font-size:13px; color:var(--ink-soft); line-height:1.5; margin-top:6px; padding:7px 10px; background:rgba(60,138,82,.06); border-radius:8px;}
.set-toggles{display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; margin-top:4px;}
.set-toggles .tg{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--ink-soft); font-weight:500;}

/* ---- Phase 6a: Knowledge Health Dashboard (home) ---- */
.health-card{background:var(--glass); border:1px solid rgba(255,255,255,.45); border-radius:var(--radius); padding:16px 18px; backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); box-shadow:var(--shadow-soft), var(--glass-edge);}
.hc-head{display:flex; justify-content:space-between; align-items:baseline; font-family:var(--serif); font-size:18px; color:var(--forest-800);}
.hc-pct{font-size:26px; font-weight:700; color:var(--green-600);}
.hc-bar{height:10px; border-radius:6px; background:rgba(60,138,82,.15); overflow:hidden; margin:8px 0 14px;}
.hc-bar i{display:block; height:100%; background:linear-gradient(90deg,var(--green-500),var(--gold));}
.hc-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px;}
.hc-stat{text-align:center; background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:10px 6px;}
.hc-num{font-family:var(--serif); font-size:24px; font-weight:700; color:var(--forest-800);}
.hc-num.warn{color:#c0392b;}
.hc-lbl{font-size:11px; color:var(--muted); margin-top:2px;}
.saved-row{display:flex; flex-wrap:wrap; gap:8px;}
.saved-chip{display:inline-flex; align-items:center; gap:6px; background:var(--glass); border:1px solid rgba(255,255,255,.45); border-radius:999px; padding:6px 12px; font-size:13px; color:var(--forest-800); cursor:pointer; backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);}
.saved-chip:hover{border-color:var(--green-500);}
.saved-chip button{border:none; background:none; color:var(--muted); font-size:12px; cursor:pointer;}

/* ---- Discover-more navigation rail (topic pages) ---- */
.navrail{margin-top:22px; background:var(--glass); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--glass-edge);}
.navrail h4{margin:0 0 10px; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-700); font-weight:700;}
.nr-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px;}
.nr-item{display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--paper); border:1px solid var(--line); border-radius:10px; transition:.15s;}
.nr-item:hover{border-color:var(--green-500); transform:translateY(-1px); box-shadow:var(--shadow-soft);}
.nr-ico{font-size:15px;} .nr-label{flex:1; font-size:13px; color:var(--ink-soft);} .nr-count{font-weight:700; color:var(--green-600); font-size:13px;}

/* ---- Query Builder facet bar ---- */
.facet-bar{display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:8px; border-bottom:1px solid var(--line); margin-bottom:6px; position:sticky; top:0; background:var(--glass-strong); backdrop-filter:var(--blur); border-radius:14px 14px 0 0; z-index:2;}
.facet{border:1px solid var(--line-strong); background:var(--paper); color:var(--ink-soft); border-radius:999px; padding:4px 11px; font-size:12px; font-weight:600; transition:.15s;}
.facet:hover{border-color:var(--green-500); color:var(--green-600);}
.facet.on{background:linear-gradient(180deg,var(--green-500),var(--green-600)); color:#fff; border-color:transparent;}
.facet-sep{width:1px; height:18px; background:var(--line-strong); margin:0 2px;}
.facet-year{width:96px; padding:4px 8px; border:1px solid var(--line-strong); border-radius:999px; font-size:12px; background:var(--paper);}

/* ---- Timeline Explorer (full-screen, peer of Thread Explorer) ---- */
#view-timeline{position:fixed; inset:0; z-index:40; display:none; background:radial-gradient(1400px 900px at 50% 30%,#16361f,#0a190f); overflow:auto;}
#view-timeline.open{display:block;}
#view-timeline .thr-top{position:sticky; background:linear-gradient(180deg,rgba(10,25,15,.92),rgba(10,25,15,.5));}
.tl-filters{position:sticky; top:64px; z-index:2; display:flex; flex-wrap:wrap; gap:6px; padding:6px 22px 12px; background:linear-gradient(180deg,rgba(10,25,15,.5),transparent);}
.tlf{border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#e7efe3; border-radius:999px; padding:4px 12px; font-size:12px; font-weight:600;}
.tlf.on{background:linear-gradient(180deg,var(--gold-400),var(--gold)); color:#3a2e08; border-color:transparent;}
.timeline-body{max-width:840px; margin:0 auto; padding:6px 22px 80px;}
.tl-year{display:flex; gap:18px; margin:6px 0;}
.tl-y{font-family:var(--serif); font-size:26px; font-weight:700; color:var(--gold-400); width:70px; flex:none; text-align:right; padding-top:6px; position:sticky; top:118px; align-self:flex-start;}
.tl-items{flex:1; border-left:2px solid rgba(255,255,255,.14); padding-left:18px; display:flex; flex-direction:column; gap:8px;}
.tl-row{display:flex; align-items:center; gap:10px; background:rgba(247,243,233,.06); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:9px 13px; color:#e7efe3; transition:.15s;}
.tl-row:hover{background:rgba(247,243,233,.13); border-color:rgba(255,255,255,.3);}
.tl-dot{width:26px; height:26px; border-radius:50%; display:grid; place-items:center; background:rgba(60,138,82,.35); flex:none;}
.tl-date{font-size:12px; color:var(--gold-200); width:64px; flex:none;}
.tl-title{flex:1; font-size:14px;} .tl-type{font-size:11px; color:rgba(231,239,227,.6); text-transform:uppercase; letter-spacing:.05em;}

/* ---- Phase 6b: Research Studio ---- */
.q-list{display:flex; flex-direction:column; gap:8px;}
.q-card{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:11px 14px; cursor:pointer; transition:.15s; box-shadow:var(--glass-edge);}
.q-card:hover{border-color:var(--green-500); transform:translateX(2px);}
.q-top{display:flex; align-items:center; gap:10px;} .q-top b{flex:1; font-size:15px; color:var(--forest-800);}
.q-status{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 9px; border-radius:999px;}
.q-meta{font-size:12px; color:var(--muted); margin-top:3px;}
.gap-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px;}
.gap-stat{text-align:center; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:9px 6px;}
.gap-stat.has{border-color:rgba(201,135,31,.4); background:rgba(201,135,31,.07);}
.gap-num{font-family:var(--serif); font-size:22px; font-weight:700; color:var(--forest-800);} .gap-stat.has .gap-num{color:#9a5b16;}
.gap-lbl{font-size:11px; color:var(--muted);}
.gap-link{color:var(--green-600); cursor:pointer;} .gap-link:hover{text-decoration:underline;}
.evidence-board{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px;}
.board-col{background:var(--glass); border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:var(--glass-edge);}
.board-h{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--gold-700); margin-bottom:8px;}
.board-card{display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line); border-radius:9px; padding:7px 9px; margin-bottom:6px; font-size:13px;}
.bc-ico{flex:none;} .bc-t{flex:1; cursor:pointer; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;} .bc-t:hover{color:var(--green-600);}
.bc-x{border:none; background:none; color:var(--muted); cursor:pointer; font-size:12px;}
/* citation graph (provenance map) */
.cg-wrap{display:flex; flex-direction:column; gap:12px; max-height:62vh; overflow:auto;}
.cg-topic{border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:var(--paper);}
.cg-blocks{margin-top:8px; display:flex; flex-direction:column; gap:6px;}
.cg-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.cg-node{font-size:12px; border-radius:8px; padding:4px 9px; border:1px solid var(--line-strong);}
.cg-t{font-weight:700; color:var(--forest-800); background:rgba(60,138,82,.1);}
.cg-k{background:rgba(58,114,196,.1); color:#2f5aa0; flex:1; min-width:160px;}
.cg-s{background:rgba(60,138,82,.12); color:var(--green-600); cursor:pointer;}
.cg-none{color:var(--muted); border-style:dashed;}
.cg-arrow{color:var(--muted);} .cg-srcs{display:flex; gap:5px; flex-wrap:wrap;}
/* analytics */
.an-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px;}
.an-tile{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px 12px; text-align:center; box-shadow:var(--glass-edge);}
.an-num{font-family:var(--serif); font-size:26px; font-weight:700; color:var(--green-600);}
.an-lbl{font-size:12px; color:var(--muted); margin-top:3px;}

/* ---- Phase 7a: Relationship Studio controls + inspector + trust ---- */
.thr-controls{position:absolute; top:64px; left:50%; transform:translateX(-50%); z-index:3; display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center; max-width:94vw; padding:6px;}
.thr-controls .thr-search{padding:6px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.25); background:rgba(10,25,15,.6); color:#e7efe3; font-size:13px; backdrop-filter:blur(8px); outline:none;}
.thr-fgroup{display:flex; gap:4px; background:rgba(10,25,15,.5); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:3px; backdrop-filter:blur(8px);}
.thr-inspector{position:absolute; top:74px; right:22px; z-index:3; width:300px; background:rgba(247,243,233,.96); border:1px solid rgba(255,255,255,.4); border-radius:16px; padding:16px 18px; box-shadow:var(--shadow), var(--glass-edge); backdrop-filter:var(--blur);}
.thr-inspector h3{font-family:var(--serif); color:var(--forest-900);}
.insp-row{display:flex; gap:8px; font-size:13px; padding:5px 0; border-top:1px solid var(--line); line-height:1.5;}
.insp-row b{width:96px; flex:none; color:var(--muted); font-weight:600;} .insp-row span{flex:1; color:var(--ink);}
.trust-row{display:flex; align-items:center; gap:14px;}
.trust-score{font-family:var(--serif); font-size:34px; font-weight:700; line-height:1;}
.trust-meta{font-size:12px; color:var(--muted); line-height:1.5;}

/* ---- Phase 7b: lineage / trace / evolution / dependency guard ---- */
.trace-head{background:rgba(60,138,82,.07); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px;}
.trace-chain{border-left:2px solid var(--green-500); margin:0 0 10px 6px; padding:2px 0 2px 12px;}
.trace-step{display:flex; gap:10px; font-size:13px; padding:4px 0; line-height:1.5;}
.trace-step .ts-k{width:120px; flex:none; color:var(--gold-700); font-weight:700; font-size:12px;}
.trace-link{color:var(--green-600); cursor:pointer; text-decoration:underline;}
.evo-list{display:flex; flex-direction:column; gap:0; margin-top:8px;}
.evo-step{display:flex; gap:12px; padding:8px 0; position:relative;}
.evo-step .evo-dot{width:12px; height:12px; border-radius:50%; background:var(--green-500); flex:none; margin-top:3px; box-shadow:0 0 0 3px rgba(60,138,82,.18);}
.evo-list .evo-step:not(:last-child)::before{content:""; position:absolute; left:5px; top:18px; bottom:-8px; width:2px; background:var(--line-strong);}
.evo-body b{font-size:14px; color:var(--forest-800);} .evo-meta{display:block; font-size:12px; color:var(--muted);}
.dep-warn{background:rgba(192,57,43,.08); border:1px solid rgba(192,57,43,.3); border-radius:10px; padding:10px 14px; color:#a5352a; font-size:14px;}
.dep-warn ul{margin:6px 0 0; padding-left:20px;} .dep-warn li{margin:2px 0;}

/* ---- Phase 8a: Governance & Integrity Center ---- */
.gv-bars{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin:6px 0 16px;}
.gv-bar{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:12px 14px; box-shadow:var(--glass-edge);}
.gv-bh{display:flex; justify-content:space-between; font-size:13px; color:var(--ink-soft); margin-bottom:6px;} .gv-bh b{font-size:18px;}
.audit-list{display:flex; flex-direction:column; gap:4px;}
.audit-row{display:flex; gap:10px; align-items:center; font-size:12px; padding:7px 10px; background:var(--paper); border:1px solid var(--line); border-radius:8px;}
.audit-act{font-weight:700; color:var(--green-600); text-transform:uppercase; letter-spacing:.04em; width:90px; flex:none;}
.audit-tgt{flex:1; color:var(--ink-soft); font-family:monospace;} .audit-by{color:var(--gold-700);} .audit-ts{color:var(--muted); width:150px; text-align:right; flex:none;}
.rule-list{display:flex; flex-direction:column; gap:6px;}
.rule-row{display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--paper); border:1px solid var(--line); border-radius:10px;}
.rule-res{font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px; flex:none;}
.rule-res.pass{background:rgba(60,138,82,.16); color:var(--green-600);}
.rule-res.fail{background:rgba(192,57,43,.14); color:#c0392b;}
.rule-res.warnr{background:rgba(201,135,31,.16); color:#9a5b16;}
.rule-res.info{background:rgba(120,128,120,.16); color:#5f7065;}
.autofix{color:var(--green-600); font-weight:600;}

/* ---- Phase 8b: diff viewer + monitor ---- */
.diff-list{display:flex; flex-direction:column; gap:8px;}
.diff-field{border:1px solid var(--line); border-radius:10px; overflow:hidden;}
.diff-k{background:rgba(60,138,82,.08); padding:5px 10px; font-size:12px; font-weight:700; color:var(--gold-700); text-transform:uppercase; letter-spacing:.04em;}
.diff-cols{display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line);}
.diff-before,.diff-after{padding:8px 10px; font-size:12px; font-family:monospace; white-space:pre-wrap; word-break:break-word; background:var(--paper);}
.diff-before{background:rgba(192,57,43,.06);} .diff-after{background:rgba(60,138,82,.07);}
.mon-row{display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--paper); border:1px solid var(--line); border-radius:10px;}
.mon-sev{font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; flex:none; width:74px; text-align:center;}
.mon-sev.fail{background:rgba(192,57,43,.14); color:#c0392b;} .mon-sev.warning{background:rgba(201,135,31,.16); color:#9a5b16;} .mon-sev.info{background:rgba(120,128,120,.16); color:#5f7065;} .mon-sev.pass{background:rgba(60,138,82,.16); color:var(--green-600);}
.mon-msg{flex:1; font-size:13px; color:var(--ink-soft);}

/* ---- Phase 8c: snapshots / compare / certification / readiness ---- */
.snap-timeline{display:flex; flex-direction:column; gap:10px;}
.snap-card{background:var(--paper); border:1px solid var(--line); border-left:3px solid var(--green-500); border-radius:12px; padding:12px 14px; box-shadow:var(--glass-edge);}
.snap-card.status-published{border-left-color:#3c8a52;} .snap-card.status-archived{border-left-color:#8a8f88; opacity:.7;} .snap-card.status-internal{border-left-color:#3a72c4;} .snap-card.status-draft{border-left-color:#c9871f;}
.snap-top{display:flex; align-items:center; gap:10px;} .snap-top b{flex:1; font-size:15px; color:var(--forest-800);}
.snap-status{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:2px 9px; border-radius:999px; background:rgba(60,138,82,.14); color:var(--green-600);}
.snap-stats{font-size:13px; color:var(--ink-soft); margin-top:4px;} .snap-meta{font-size:11px; color:var(--muted); margin-top:2px; font-family:monospace;}
.snap-actions{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
.cmp-list{display:flex; flex-direction:column; gap:4px;}
.cmp-row{display:grid; grid-template-columns:1.4fr .7fr .3fr .7fr 1fr; gap:8px; align-items:center; padding:7px 10px; background:var(--paper); border:1px solid var(--line); border-radius:8px; font-size:13px;}
.cmp-row.cmp-head{background:none; border:none; font-size:11px; color:var(--muted); text-transform:uppercase;}
.cmp-k{font-weight:600; color:var(--ink-soft);} .cmp-a,.cmp-b{font-family:var(--serif); font-weight:700; text-align:center;} .cmp-arrow{color:var(--muted); text-align:center;}
.cmp-delta .add{color:var(--green-600); font-weight:700; margin-right:6px;} .cmp-delta .rem{color:#c0392b; font-weight:700;}
.cert-row{display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--paper); border:1px solid var(--line); border-radius:10px;}
.cert-levels{display:flex; gap:4px; flex-wrap:wrap;}
.cert-pill{border:1px solid var(--line-strong); background:var(--paper); color:var(--ink-soft); border-radius:999px; padding:3px 9px; font-size:11px; font-weight:600; transition:.15s;}
.cert-pill:hover{border-color:var(--green-500);}
.rd-list{display:flex; flex-direction:column; gap:8px; margin-bottom:6px;}
.rd-row{display:flex; align-items:center; font-size:13px;} .rd-k{width:160px; color:var(--ink-soft);}

/* ===== UX Sprint 1 (UI only) ===== */
/* a11y: visible keyboard focus everywhere */
:focus-visible{ outline:3px solid var(--gold-400); outline-offset:2px; border-radius:6px; }
.trow:focus-visible{ outline:3px solid var(--gold-400); outline-offset:-2px; }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; transition-duration:.001ms !important; scroll-behavior:auto !important; } }

/* Review Center: filter + bulk toolbar */
.rv-toolbar{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:6px 0 10px; }
.rv-sep{ width:1px; height:20px; background:var(--line-strong); margin:0 4px; }
.rv-chip{ font-size:12px; font-weight:600; padding:5px 11px; min-height:30px; border-radius:999px; cursor:pointer;
  border:1px solid var(--line); background:var(--paper); color:var(--ink-soft); transition:.15s; }
.rv-chip:hover{ border-color:var(--green-500); }
.rv-chip.on{ background:var(--green-600); color:#fff; border-color:var(--green-600); }
.rv-bulkbar{ display:flex; align-items:center; gap:10px; padding:8px 12px; margin-bottom:12px; flex-wrap:wrap;
  background:var(--glass); border:1px solid var(--line); border-radius:12px; position:sticky; top:6px; z-index:5; backdrop-filter:var(--blur); }
.rv-check{ display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; }
.rv-check input{ width:17px; height:17px; cursor:pointer; accent-color:var(--green-600); }
.rv-selcount{ font-size:13px; color:var(--muted); font-weight:600; }
.rv-hint{ font-size:11px; color:var(--muted); border:1px dashed var(--line-strong); border-radius:8px; padding:3px 8px; }
.rv-card.rv-cursor{ box-shadow:0 0 0 2px var(--gold-400); }

/* Tree: persistent star + stronger selected */
.trow .tstar{ opacity:.28; transition:opacity .15s, color .15s; }
.trow:hover .tstar, .trow .tstar.on{ opacity:1; }
.trow .tstar.on{ color:var(--gold-400); }
.trow.active{ position:relative; }
.trow.active::before{ content:""; position:absolute; left:0; top:3px; bottom:3px; width:3px; border-radius:2px; background:var(--gold-400); }

/* ===== UX Sprint 2 (UI only) ===== */
/* sticky + clearer topic tabs */
.tabs{ position:sticky; top:0; z-index:6; background:var(--glass-strong,var(--glass)); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); }
.tab{ min-height:44px; }
.tab.active{ background:rgba(60,138,82,.10); border-bottom-width:3px; border-radius:8px 8px 0 0; }
.tab[aria-selected="true"]{ font-weight:700; }
/* overview section jump-links */
.sec-nav{ display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 14px; }
.sec-link{ font-size:12px; font-weight:600; color:var(--ink-soft); background:var(--paper); border:1px solid var(--line);
  border-radius:999px; padding:5px 12px; min-height:30px; cursor:pointer; transition:.15s; }
.sec-link:hover{ border-color:var(--green-500); color:var(--green-600); }
/* facet counts + result header */
.facet-n{ font-size:11px; opacity:.7; font-weight:700; }
.facet[disabled]{ opacity:.4; cursor:not-allowed; }
.facet[aria-pressed="true"]{ font-weight:700; }
.res-count{ font-size:12px; color:var(--muted); padding:8px 14px 2px; font-weight:600; }
/* search result keyboard highlight */
.search-result.sel{ background:rgba(60,138,82,.12); box-shadow:inset 3px 0 0 var(--green-600); }
/* knowledge card readability */
.kb-card{ padding:14px 16px; }
.kb-card .kb-top{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.kb-card .rv-statement, .kb-card .kb-statement{ line-height:1.6; }
.kb-card .kb-meta, .kb-card .rv-meta{ margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); color:var(--muted); }
/* min touch targets */
.icon-btn{ min-width:32px; min-height:32px; }
.topbar .icon-btn{ min-width:40px; min-height:40px; }
.facet, .rv-chip, .sec-link, .btn.sm{ min-height:32px; }

/* ===== UX Sprint 3 (UI only) ===== */
/* knowledge section toolbar + compact/pin */
.kb-toolbar{ display:flex; align-items:center; gap:8px; margin:2px 0 10px; }
.kb-count{ font-size:12px; color:var(--muted); font-weight:600; }
.kb-list.compact .kb-evs, .kb-list.compact .kb-chips{ display:none; }
.kb-list.compact .kb-card{ padding:8px 12px; }
.kb-list.compact .kb-statement{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.kb-card.pinned{ background:rgba(216,182,100,.07); box-shadow:0 0 0 1px rgba(216,182,100,.4); }
.kb-pinmark{ font-size:12px; }
.kb-card .kb-top .icon-btn{ opacity:.55; transition:opacity .15s; }
.kb-card:hover .kb-top .icon-btn, .kb-card .kb-top .icon-btn:focus-visible{ opacity:1; }
/* topic actions menu */
.act-menu{ position:relative; display:inline-block; }
.act-menu summary{ list-style:none; cursor:pointer; user-select:none; }
.act-menu summary::-webkit-details-marker{ display:none; }
.act-pop{ position:absolute; right:0; top:calc(100% + 4px); z-index:20; display:flex; flex-direction:column; min-width:180px;
  background:var(--glass-strong,#fff); border:1px solid var(--line-strong); border-radius:12px; padding:6px; box-shadow:0 18px 50px -18px rgba(0,0,0,.5); backdrop-filter:var(--blur); }
.act-pop button{ text-align:left; background:none; border:none; padding:9px 12px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--ink); min-height:40px; }
.act-pop button:hover{ background:rgba(60,138,82,.10); }
.act-pop button.danger{ color:#c0392b; }
/* review progress */
.rv-progress{ display:flex; align-items:center; gap:10px; margin:2px 0 8px; }
.rv-pbar{ flex:1; height:8px; background:rgba(60,138,82,.15); border-radius:5px; overflow:hidden; }
.rv-pbar i{ display:block; height:100%; background:linear-gradient(90deg,var(--green-500),var(--gold)); transition:width .3s; }
.rv-plbl{ font-size:12px; color:var(--muted); font-weight:600; white-space:nowrap; }

<script>
"use strict";
/* ============================================================= *
 *  EKOS core — utilities
 * ============================================================= */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = (p="id")=>p+"_"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
/* Phase 4: typed stable IDs for every persistent entity (topic_/kb_/ev_/src_/prin_/prop_/conf_/evt_/thr_).
   Permanent, never reused. Uses crypto.randomUUID() when available, else falls back to uid(). */
const nid = (p="id")=>{ try{ if(crypto&&crypto.randomUUID) return p+"_"+crypto.randomUUID().replace(/-/g,"").slice(0,16); }catch(e){} return uid(p); };
const now = ()=>Date.now();
const esc = s=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const debounce=(fn,ms=400)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};
function fmtDate(ts){if(!ts)return"";const d=new Date(ts);return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});}
function fmtTime(ts){const d=new Date(ts),s=(now()-ts)/1000;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return fmtDate(ts);}
function fmtBytes(b){if(!b)return"";const u=["B","KB","MB","GB"];let i=0;while(b>=1024&&i<3){b/=1024;i++;}return b.toFixed(b<10&&i>0?1:0)+" "+u[i];}
function toast(msg,icon="✓"){const t=document.createElement("div");t.className="toast";t.innerHTML=`<span class="tx">${icon}</span>${esc(msg)}`;$("#toast-root").appendChild(t);setTimeout(()=>{t.style.opacity="0";t.style.transition=".4s";setTimeout(()=>t.remove(),400);},2600);}

/* Phase 4 (Blob storage): resolve a file record to a usable src URL. New files store a Blob;
   legacy files keep a base64 `url`. Object URLs are created once per file and cached. */
const _objURL=new Map();
function fileSrc(f){ if(!f)return""; if(f.blob){ let u=_objURL.get(f.id); if(!u){u=URL.createObjectURL(f.blob);_objURL.set(f.id,u);} return u; } return f.url||""; }
function revokeFileSrc(id){ const u=_objURL.get(id); if(u){URL.revokeObjectURL(u);_objURL.delete(id);} }
async function fileBlob(f){ if(f.blob)return f.blob; if(f.url)return await (await fetch(f.url)).blob(); return null; }
function blobToDataURL(blob){ return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(blob); }); }

/* Phase 8a — security: sanitize HTML that did NOT originate from the user's own editing
   (imported backups, ingested documents, clipboard). Strips scripts, event handlers, and
   javascript:/data:text/html URLs. Pure DOM, no dependencies. (fixes audit #14) */
function sanitizeHTML(html){ if(html==null)return ""; const tpl=document.createElement("template"); tpl.innerHTML=String(html);
  const bad={script:1,style:1,iframe:1,object:1,embed:1,link:1,meta:1,base:1,form:1};
  (function walk(node){ [...node.childNodes].forEach(n=>{ if(n.nodeType!==1){return;}
    if(bad[n.tagName.toLowerCase()]){ n.remove(); return; }
    [...n.attributes].forEach(a=>{ const an=a.name.toLowerCase(), av=(a.value||"").replace(/\s+/g,"").toLowerCase();
      if(an.startsWith("on")|| ((an==="href"||an==="src"||an==="xlink:href")&&(av.startsWith("javascript:")||av.startsWith("data:text/html")))) n.removeAttribute(a.name); });
    walk(n); }); })(tpl.content);
  return tpl.innerHTML; }

/* Phase 8a — centralized Capability registry + version stamps (future-proofs Phases 9-11).
   Modules ask `EKOS.capabilities.has("governance")` instead of checking settings directly. */
const CAP={ ai:true, governance:true, researchStudio:true, semanticSearch:true, snapshots:true, timeline:true, threads:true, templates:false, publishing:false, collaboration:false, enterprise:false };
const EKOS_VERSION="4.0", EKOS_BUILD=8;   // recorded into every Snapshot (Phase 8c) alongside schema/db version
const EKOS={ version:EKOS_VERSION, build:EKOS_BUILD,
  capabilities:{ has(n){return !!CAP[n];}, enable(n){CAP[n]=true;}, disable(n){CAP[n]=false;}, list(){return Object.keys(CAP).filter(k=>CAP[k]);} } };

/* similarity (Dice on bigrams) for duplicate detection / matching */
function bigrams(s){s=(s||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();const o=[];for(let i=0;i<s.length-1;i++)o.push(s.slice(i,i+2));return o;}
function similarity(a,b){const x=bigrams(a),y=bigrams(b);if(!x.length||!y.length)return 0;const m={};x.forEach(g=>m[g]=(m[g]||0)+1);let hit=0;y.forEach(g=>{if(m[g]>0){hit++;m[g]--;}});return(2*hit)/(x.length+y.length);}

/* ---- Phase 3: Web Worker harness (inline Blob worker, build-compatible, works from file://) ----
   Lets later phases (ingestion, search indexing) run heavy work off the main thread so the UI
   never freezes. `fn` must be a pure, self-contained (data)=>result function. Falls back to
   running on the main thread when Workers are unavailable. */
const EKOSWorker={
  supported:(typeof Worker!=="undefined"),
  spawn(fn){
    const mainFallback=()=>({call:(d)=>Promise.resolve().then(()=>fn(d)),terminate(){},main:true});
    if(!this.supported)return mainFallback();
    let w,url;
    try{
      const src="self.onmessage=function(e){Promise.resolve((" + fn.toString() +
        ")(e.data.payload)).then(function(r){self.postMessage({id:e.data.id,ok:true,result:r});})" +
        ".catch(function(err){self.postMessage({id:e.data.id,ok:false,error:String(err&&err.message||err)});});};";
      url=URL.createObjectURL(new Blob([src],{type:"text/javascript"}));
      w=new Worker(url);
    }catch(e){return mainFallback();}
    const pending=new Map(); let seq=0;
    w.onmessage=ev=>{const p=pending.get(ev.data.id);if(!p)return;pending.delete(ev.data.id);ev.data.ok?p.res(ev.data.result):p.rej(new Error(ev.data.error));};
    w.onerror=()=>{pending.forEach(p=>p.rej(new Error("worker error")));pending.clear();};
    return {
      call(payload){return new Promise((res,rej)=>{const id=++seq;pending.set(id,{res,rej});w.postMessage({id,payload});});},
      terminate(){try{w.terminate();}catch(e){}if(url)URL.revokeObjectURL(url);}
    };
  }
};

/* ============================================================= *
 *  Translation engine (Hindi ⇄ English)
 * ============================================================= */
function detectLang(text){const dev=(text.match(/[ऀ-ॿ]/g)||[]).length;const lat=(text.match(/[A-Za-z]/g)||[]).length;return dev>lat?"hi":"en";}
async function translateText(text,target){
  text=(text||"").trim();if(!text)return"";
  /* Phase 5: any configured provider (Claude/OpenAI/Gemini/Ollama) via the adapter; else free fallback */
  if(typeof aiAvailable==="function" && aiAvailable()){ try{ return await translateLLM(text,target); }catch(e){ console.warn("LLM translate failed",e); } }
  return await translateFree(text,target);
}
async function translateLLM(text,target){
  const langName=target==="hi"?"Hindi (Devanagari script)":"English";
  const prompt=`Translate the following text into ${langName}. Preserve meaning, tone, and any line breaks or list structure. Return ONLY the translation with no preamble, notes, or quotes.\n\n${text.slice(0,12000)}`;
  return (await callLLM(prompt)).trim();
}
/* keyless fallback: MyMemory (chunked by sentences, free tier) */
async function translateFree(text,target){
  const src=target==="hi"?"en":"hi";const pair=src+"|"+target;
  const chunks=chunkText(text,480);const out=[];
  for(const ch of chunks){
    const url="https://api.mymemory.translated.net/get?q="+encodeURIComponent(ch)+"&langpair="+pair;
    const r=await fetch(url);if(!r.ok)throw new Error("translate "+r.status);
    const j=await r.json();out.push((j.responseData&&j.responseData.translatedText)||ch);
  }
  return out.join(" ");
}
function chunkText(text,max){const parts=text.split(/(?<=[.!?।\n])\s+/);const out=[];let cur="";
  for(const p of parts){if((cur+" "+p).length>max){if(cur)out.push(cur);cur=p;}else cur=(cur?cur+" ":"")+p;}
  if(cur)out.push(cur);return out.length?out:[text.slice(0,max)];}

/* ============================================================= *
 *  IndexedDB layer (promise wrapper)
 * ============================================================= */
const DB={
  name:"ekos-db", version:5, _db:null,
  /* Phase 4 Knowledge Core + Phase 6 Discovery/Research + Phase 8 Governance: stores added incrementally.
     onupgradeneeded only CREATES missing stores, so existing data (any prior version) is preserved. */
  stores:{topics:"id",notes:"id",files:"id",threads:"id",versions:"id",meta:"key",
    sources:"id",knowledge:"id",principles:"id",proposals:"id",conflicts:"id",events:"id",
    searches:"id",collections:"id",research:"id",people:"id",orgs:"id",questions:"id",
    snapshots:"id",rules:"id",certifications:"id",audit:"id"},
  open(){return new Promise((res,rej)=>{const r=indexedDB.open(this.name,this.version);
    r.onupgradeneeded=e=>{const db=e.target.result;Object.entries(this.stores).forEach(([n,k])=>{if(!db.objectStoreNames.contains(n))db.createObjectStore(n,{keyPath:k});});};
    r.onsuccess=e=>{this._db=e.target.result;res(this._db);};r.onerror=e=>rej(e.target.error);});},
  tx(store,mode="readonly"){return this._db.transaction(store,mode).objectStore(store);},
  getAll(store){return new Promise((res,rej)=>{const r=this.tx(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  get(store,key){return new Promise((res,rej)=>{const r=this.tx(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  put(store,val){return new Promise((res,rej)=>{const r=this.tx(store,"readwrite").put(val);r.onsuccess=()=>res(val);r.onerror=()=>rej(r.error);});},
  del(store,key){return new Promise((res,rej)=>{const r=this.tx(store,"readwrite").delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  bulk(store,vals){return new Promise((res,rej)=>{const t=this._db.transaction(store,"readwrite");const o=t.objectStore(store);vals.forEach(v=>o.put(v));t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
};

/* ---- Repository layer over DB: each repo declares a schemaVersion + migration path ---- */
function Repo(store, schemaVersion){
  return {
    store, schemaVersion,
    all(){ return DB.getAll(store); },
    get(id){ return DB.get(store, id); },
    put(v){ return DB.put(store, v); },
    del(id){ return DB.del(store, id); },
    bulk(vs){ return DB.bulk(store, vs); }
  };
}
const REPOS={
  topics:Repo("topics",1), notes:Repo("notes",1), files:Repo("files",2), threads:Repo("threads",1), versions:Repo("versions",1),
  sources:Repo("sources",1), knowledge:Repo("knowledge",1), principles:Repo("principles",1),
  proposals:Repo("proposals",1), conflicts:Repo("conflicts",1), events:Repo("events",1),

async function migrateGovernance(){   // seed default rules + one-time meta.audit.log → audit store
  if(!(await DB.getAll("rules")).length){ for(const r of DEFAULT_RULES) await DB.put("rules",r); }
  const m=await DB.get("meta","audit"); if(m&&m.log&&m.log.length&&!m.migrated){ for(const e of m.log){ await DB.put("audit",Object.assign({id:nid("aud")},e)); } await DB.put("meta",{key:"audit",log:[],migrated:true}); }
}
const _baseStores=["topics","notes","files","threads","versions","meta"]; // predate schema tracking → assumed at v1

/* ---- ordered, explicit migrations per store (from→current). Never guessed. ---- */
const MIGRATIONS={
  files:{
    2: async ()=>{ // base64 data-URL `url` -> Blob (audit #1/#2)
      const all=await DB.getAll("files"); let migrated=0;
      for(const f of all){
        if(f.blob || !f.url) continue;
        try{ const blob=await (await fetch(f.url)).blob(); f.blob=blob; f.mime=f.type||blob.type; delete f.url; await DB.put("files",f); migrated++; }
        catch(e){ console.warn("files v2 migrate failed for",f.id,e); }
      }
      return migrated;
    }
  }
};
async function runMigrations(){
  const meta=(await DB.get("meta","schema"))||{key:"schema",versions:{}};
  const v=meta.versions||{};
  for(const store of Object.keys(REPOS)){
    const target=REPOS[store].schemaVersion;
    let cur=v[store];
    if(cur==null) cur = _baseStores.includes(store) ? 1 : target; // legacy base stores at v1; brand-new stores start current
    for(let ver=cur+1; ver<=target; ver++){
      const fn=MIGRATIONS[store] && MIGRATIONS[store][ver];
      if(fn){ try{ const r=await fn(); console.log("EKOS migrate",store,"→ v"+ver, (r!=null?("("+r+")"):"")); }catch(e){ console.warn("migration error",store,ver,e); } }
    }
    v[store]=target;
  }
  await DB.put("meta",{key:"schema",versions:v});
  return v;
}

/* upgrade legacy threads ({a,b,type:verified|ai,label}) into first-class relationships */
function normalizeThreads(){ (S.threads||[]).forEach(e=>{
  if(!e.confidence) e.confidence = e.type==="verified" ? "verified" : "ai-med";
  if(!e.relType){ const l=(e.label||"").toLowerCase();
    e.relType = /improv|lower|boost|reduc|aid|enhanc/.test(l)?"improves"
      : /depend|require|prerequisite/.test(l)?"depends_on"
      : /foundation|enable|anchor|regulat|circadian|serotonin|gut|buffer/.test(l)?"supports"
      : /shared|similar|relate/.test(l)?"references"
      : "supports"; }
  if(!e.category) e.category = relCategory(e.relType);
  if(e.createdBy==null) e.createdBy = e.type==="verified" ? "user" : "ai";
  if(e.verified==null) e.verified = e.type==="verified";
  if(!e.reason) e.reason = e.label||"";
  if(!e.evidence) e.evidence = [];
  if(!e.sourceIds) e.sourceIds = [];
  if(e.lastReviewed===undefined) e.lastReviewed = e.verified ? (e.createdDate||null) : null;  // relationship quality
}); }
/* relationship strength (quality) derived from confidence + evidence + sources */
function relStrength(e){ let s=({verified:3,"ai-high":2,"ai-med":1,"ai-low":0}[e.confidence]||0)+Math.min(2,(e.evidence||[]).length)+Math.min(2,(e.sourceIds||[]).length)+(e.verified?1:0);
  return s>=5?"High":s>=3?"Medium":"Low"; }

 * ============================================================= */
/* Phase 3: secondary indexes for O(1)-ish lookups at scale (10k topics / 100k notes).
   Maintained automatically by wrapping the Maps' set/delete — so every existing call
   site (S.topics.set(...), S.files.delete(...), etc.) keeps the indexes correct with
   zero changes elsewhere. get/forEach/values/size/has fall through to the real Map. */
const IDX={ childrenByParent:new Map(), notesByTopic:new Map(), filesByTopic:new Map(), threadsByNode:new Map() };
function _idxAdd(map,key,id){ if(key==null)return; let s=map.get(key); if(!s){s=new Set();map.set(key,s);} s.add(id); }
function _idxDel(map,key,id){ if(key==null)return; const s=map.get(key); if(s){s.delete(id); if(!s.size)map.delete(key);} }
let _searchDirty=true;                 // search corpus cache invalidation (used by search module)
function markSearchDirty(){ _searchDirty=true; }
function makeObservableMap(onSet,onDel){
  const m=new Map();
  const _set=Map.prototype.set.bind(m), _delete=Map.prototype.delete.bind(m);
  m.set=(k,v)=>{ const old=m.get(k); _set(k,v); try{onSet(k,v,old);}catch(e){console.warn("idx set",e);} _searchDirty=true; return m; };
  m.delete=(k)=>{ const old=m.get(k); const r=_delete(k); if(old!==undefined){ try{onDel(k,old);}catch(e){console.warn("idx del",e);} _searchDirty=true; } return r; };
  return m;
}
function _onTopicSet(id,t,old){ if(old&&old.parentId!==t.parentId)_idxDel(IDX.childrenByParent,old.parentId,id); _idxAdd(IDX.childrenByParent,t.parentId,id); }
function _onTopicDel(id,old){ _idxDel(IDX.childrenByParent,old.parentId,id); }
function _onNoteSet(id,n,old){ if(old&&old.topicId!==n.topicId)_idxDel(IDX.notesByTopic,old.topicId,id); _idxAdd(IDX.notesByTopic,n.topicId,id); }
function _onNoteDel(id,old){ _idxDel(IDX.notesByTopic,old.topicId,id); }
function _onFileSet(id,f,old){ if(old)(old.topicIds||[]).forEach(tid=>_idxDel(IDX.filesByTopic,tid,id)); (f.topicIds||[]).forEach(tid=>_idxAdd(IDX.filesByTopic,tid,id)); }
function _onFileDel(id,old){ (old.topicIds||[]).forEach(tid=>_idxDel(IDX.filesByTopic,tid,id)); }

const S={
  topics:makeObservableMap(_onTopicSet,_onTopicDel),
  threads:[],
  files:makeObservableMap(_onFileSet,_onFileDel),
  notes:makeObservableMap(_onNoteSet,_onNoteDel),
  meta:{recent:[], settings:{apiKey:"",model:"claude-sonnet-4-6",provider:"offline",bgImage:"",glassOpacity:66,lang:"en"}, expanded:["root"], treeWidth:340},
  view:"home", currentTopic:null, activeTab:"overview",
};
function rebuildThreadIndex(){ IDX.threadsByNode.clear(); S.threads.forEach((th,i)=>{ _idxAdd(IDX.threadsByNode,th.a,i); _idxAdd(IDX.threadsByNode,th.b,i); }); markSearchDirty(); }
function rebuildIndexes(){ // safety net (e.g. after bulk import); incremental maintenance keeps these current otherwise
  IDX.childrenByParent.clear(); IDX.notesByTopic.clear(); IDX.filesByTopic.clear();
  S.topics.forEach((t,id)=>_idxAdd(IDX.childrenByParent,t.parentId,id));
  S.notes.forEach((n,id)=>_idxAdd(IDX.notesByTopic,n.topicId,id));
  S.files.forEach((f,id)=>(f.topicIds||[]).forEach(tid=>_idxAdd(IDX.filesByTopic,tid,id)));
  rebuildThreadIndex(); markSearchDirty();
}
function metaSave(){return DB.put("meta",{key:"app",...S.meta});}

/* ---- topic helpers (index-backed) ---- */
function topic(id){return S.topics.get(id);}
function children(pid){ const s=IDX.childrenByParent.get(pid); if(!s)return [];
  const arr=[]; s.forEach(id=>{const t=S.topics.get(id); if(t)arr.push(t);});
  return arr.sort((a,b)=>(a.order||0)-(b.order||0)||a.title.localeCompare(b.title)); }
function pathOf(id){const p=[];let t=topic(id);let guard=0;while(t&&guard++<50){p.unshift(t);t=t.parentId?topic(t.parentId):null;}return p;}
function pathString(id){return pathOf(id).map(t=>t.title).join("  ›  ");}
async function saveTopic(t,snapshot){t.updatedAt=now();S.topics.set(t.id,t);markSearchDirty();await DB.put("topics",t);if(snapshot)await pushVersion(t);}
async function pushVersion(t){const v={id:uid("v"),targetId:t.id,kind:"topic",ts:now(),title:t.title,snapshot:JSON.parse(JSON.stringify({title:t.title,structured:t.structured,custom:t.custom}))};await DB.put("versions",v);}
function notesOf(id){ const s=IDX.notesByTopic.get(id); if(!s)return [];
  const arr=[]; s.forEach(nid=>{const n=S.notes.get(nid); if(n)arr.push(n);});
  return arr.sort((a,b)=>b.updatedAt-a.updatedAt); }
function filesOf(id,kind){ const s=IDX.filesByTopic.get(id); if(!s)return [];
  const arr=[]; s.forEach(fid=>{const f=S.files.get(fid); if(f&&(!kind||f.kind===kind))arr.push(f);});
  return arr.sort((a,b)=>b.addedAt-a.addedAt); }
function threadsOf(id){ const s=IDX.threadsByNode.get(id); if(!s)return [];
  const arr=[]; s.forEach(i=>{const th=S.threads[i]; if(th)arr.push(th);}); return arr; }

 *  Knowledge Core — in-memory state, indexes & helpers  (Phase 4)
 *  Runs after 05 (S, IDX, makeObservableMap, markSearchDirty defined).
 * ============================================================= */
IDX.knowledgeByTopic=new Map();
IDX.knowledgeByPrinciple=new Map();
function _onKbSet(id,b,old){
  if(old){
    if(old.topicId!==b.topicId)_idxDel(IDX.knowledgeByTopic,old.topicId,id);
    (old.principleIds||[]).forEach(pid=>{ if(!(b.principleIds||[]).includes(pid))_idxDel(IDX.knowledgeByPrinciple,pid,id); });
  }
  _idxAdd(IDX.knowledgeByTopic,b.topicId,id);
  (b.principleIds||[]).forEach(pid=>_idxAdd(IDX.knowledgeByPrinciple,pid,id));
}
function _onKbDel(id,old){ _idxDel(IDX.knowledgeByTopic,old.topicId,id); (old.principleIds||[]).forEach(pid=>_idxDel(IDX.knowledgeByPrinciple,pid,id)); }
S.sources=makeObservableMap(()=>{},()=>{});
S.knowledge=makeObservableMap(_onKbSet,_onKbDel);
S.principles=makeObservableMap(()=>{},()=>{});

/* lookups */
function knowledgeOf(topicId){ const s=IDX.knowledgeByTopic.get(topicId); if(!s)return [];
  const a=[]; s.forEach(id=>{const b=S.knowledge.get(id); if(b)a.push(b);}); return a.sort((x,y)=>(x.created||0)-(y.created||0)); }
function blocksForPrinciple(pid){ const s=IDX.knowledgeByPrinciple.get(pid); if(!s)return [];
  const a=[]; s.forEach(id=>{const b=S.knowledge.get(id); if(b)a.push(b);}); return a; }
function principleBacklinkTopics(pid){ const set=new Set(); blocksForPrinciple(pid).forEach(b=>{ if(b.topicId)set.add(b.topicId); });
  return [...set].map(id=>topic(id)).filter(Boolean); }
function source(id){ return S.sources.get(id); }
function principle(id){ return S.principles.get(id); }
function sourcesAll(){ return [...S.sources.values()].sort((a,b)=>(a.title||"").localeCompare(b.title||"")); }
function principlesAll(){ return [...S.principles.values()].sort((a,b)=>(a.title||"").localeCompare(b.title||"")); }
function sourceByTitle(t){ t=(t||"").trim().toLowerCase(); for(const s of S.sources.values()){ if((s.title||"").trim().toLowerCase()===t)return s; } return null; }
function principleByTitle(t){ t=(t||"").trim().toLowerCase(); for(const p of S.principles.values()){ if((p.title||"").trim().toLowerCase()===t)return p; } return null; }
function sourcesForTopic(topicId){ const ids=new Set();
  knowledgeOf(topicId).forEach(b=>{ (b.sources||[]).forEach(r=>ids.add(r.sourceId)); (b.evidence||[]).forEach(ev=>{ if(ev.sourceId)ids.add(ev.sourceId); }); });
  return [...ids].map(id=>source(id)).filter(Boolean); }

async function savePrinciple(p,reason){ p.updated=now(); S.principles.set(p.id,p); markSearchDirty(); await DB.put("principles",p); if(typeof recordVersion==="function")await recordVersion("principle",p,reason||"edit"); }

/* ---- resizer ---- */
/* Fix (audit #8): window mousemove/mouseup were re-added on every renderApp and never
   removed (listener leak). Now the global handlers are wired exactly once; the per-element
   mousedown is re-bound to the fresh #resizer each render (old element is GC'd). */
function setupResizer(){
  const rz=$("#resizer");if(!rz)return;
  rz.addEventListener("mousedown",e=>{setupResizer._drag=true;rz.classList.add("drag");e.preventDefault();document.body.style.userSelect="none";});
  if(setupResizer._wired)return; setupResizer._wired=true;
  window.addEventListener("mousemove",e=>{if(!setupResizer._drag)return;const panel=$("#tree-panel");if(!panel)return;const w=Math.max(200,Math.min(620,e.clientX-panel.getBoundingClientRect().left));panel.style.width=w+"px";S.meta.treeWidth=w;});
  window.addEventListener("mouseup",()=>{if(setupResizer._drag){setupResizer._drag=false;const el=$("#resizer");if(el)el.classList.remove("drag");document.body.style.userSelect="";metaSaveDebounced();}});
}
function setupTopSearch(){
  const inp=$("#top-search");
  inp.addEventListener("input",()=>openSearchDebounced(inp.value));   // Phase 3: debounced
  inp.addEventListener("focus",()=>{if(inp.value.trim())openSearch(inp.value);});
}

function renderTree(){
  const scroll=$("#tree-scroll");if(!scroll)return;
  scroll.innerHTML="";
  const root=topic("root");
  scroll.appendChild(treeNode(root,0));
  if(!scroll._kbd){ scroll._kbd=true; scroll.addEventListener("keydown",treeKeydown); }
}
function treeNode(t,depth){
  const wrap=document.createElement("div");wrap.className="tnode";
  const kids=children(t.id);
  const open=isExpanded(t.id);
  const row=document.createElement("div");
  row.className="trow"+(S.currentTopic===t.id?" active":"");
  row.dataset.id=t.id;
  row.tabIndex=(S.currentTopic===t.id)?0:-1;     // roving tabindex
  row.setAttribute("role","treeitem");
  if(kids.length)row.setAttribute("aria-expanded",open?"true":"false");
  row.innerHTML=`<span class="caret ${open?'open':''}">${kids.length?'▶':'&nbsp;'}</span>
    <span class="tico">${ticon(t)}</span>
    <span class="tlabel">${esc(t.title)}</span>
    <span class="tstar ${t.favorite?'on':''}" title="Favorite" aria-label="${t.favorite?'Unfavorite':'Favorite'}">★</span>`;
  row.querySelector(".caret").addEventListener("click",e=>{e.stopPropagation();if(kids.length){toggleExpand(t.id);renderTree();}});
  row.querySelector(".tstar").addEventListener("click",e=>{e.stopPropagation();toggleFav(t.id);});
  row.addEventListener("click",()=>{if(kids.length&&!isExpanded(t.id))toggleExpand(t.id);openTopic(t.id);});
  wrap.appendChild(row);
  if(open&&kids.length){const c=document.createElement("div");c.className="tchildren";c.setAttribute("role","group");kids.forEach(k=>c.appendChild(treeNode(k,depth+1)));wrap.appendChild(c);}
  return wrap;
}
function treeKeydown(e){
  const rows=[...$("#tree-scroll").querySelectorAll(".trow")];
  let i=rows.indexOf(document.activeElement); if(i<0)i=rows.findIndex(r=>r.classList.contains("active"));
  const cur=rows[i]; const id=cur&&cur.dataset.id; const t=id&&topic(id); const kids=t?children(id):[];
  const focus=n=>{ if(rows[n]){rows.forEach(r=>r.tabIndex=-1); rows[n].tabIndex=0; rows[n].focus(); } };
  switch(e.key){
    case "ArrowDown": e.preventDefault(); focus(Math.min(i+1,rows.length-1)); break;
    case "ArrowUp":   e.preventDefault(); focus(Math.max(i-1,0)); break;
    case "ArrowRight":e.preventDefault(); if(kids.length&&!isExpanded(id)){toggleExpand(id);renderTree();focusTreeId(id);} else if(kids.length){focus(i+1);} break;
    case "ArrowLeft": e.preventDefault(); if(kids.length&&isExpanded(id)){toggleExpand(id);renderTree();focusTreeId(id);} else if(t&&t.parentId){focusTreeId(t.parentId);} break;
    case "Enter": case " ": e.preventDefault(); if(id){if(kids.length&&!isExpanded(id))toggleExpand(id); openTopic(id);} break;
    case "f": case "*": if(id){e.preventDefault(); toggleFav(id);} break;
  }
}
function focusTreeId(id){ const r=$("#tree-scroll").querySelector('.trow[data-id="'+id+'"]'); if(r){ $("#tree-scroll").querySelectorAll(".trow").forEach(x=>x.tabIndex=-1); r.tabIndex=0; r.focus(); } }
