function rtBtn(cmd,label,title){return `<button title="${title}" onmousedown="event.preventDefault()" onclick="rtCmd('${cmd}')">${label}</button>`;}
function rtCmd(cmd){
  const rt=$("#rt-content");rt.focus();
  if(cmd.startsWith("formatBlock:")){document.execCommand("formatBlock",false,cmd.split(":")[1]);}
  else if(cmd==="createLink"){const u=prompt("Link URL:");if(u)document.execCommand("createLink",false,u);}
  else if(cmd==="image"){const u=prompt("Image URL:");if(u)document.execCommand("insertImage",false,u);}
  else if(cmd==="insertTable"){document.execCommand("insertHTML",false,`<table><tr><th>Column</th><th>Column</th></tr><tr><td>&nbsp;</td><td>&nbsp;</td></tr></table><p></p>`);}
  else if(cmd==="checklist"){document.execCommand("insertHTML",false,`<ul data-check><li>Task</li></ul>`);}
  else{document.execCommand(cmd,false,null);}
  rt.dispatchEvent(new Event("input"));
}
async function saveStructured(t,pane){
  const s=t.structured=t.structured||{};
  const get=k=>{const el=$(`.sbody[data-k="${k}"]`,pane);return el?el:null;};
  const txt=el=>el?el.innerText.replace(/ /g," "):"";
  if(get("description"))s.description=get("description").innerHTML.trim();
  if(get("purpose"))s.purpose=get("purpose").innerHTML.trim();
  if(get("benefits"))s.benefits=txt(get("benefits")).split("\n").map(x=>x.replace(/^[•\-\*\s]+/,"").trim()).filter(Boolean);
  if(get("procedure"))s.procedure=txt(get("procedure")).split("\n").map(x=>x.replace(/^[\d]+[\.\)]\s*/,"").trim()).filter(Boolean);
  let research=(s.research||[]);
  if(get("research"))research=txt(get("research")).split("\n").map(x=>x.trim()).filter(Boolean);
  if(get("research-extra")){const extra=txt(get("research-extra")).split("\n").map(x=>x.trim()).filter(Boolean);research=research.concat(extra);}
  s.research=research;
  await saveTopic(t,true);flashSaved();
}
function appearsInHTML(t){
  const list=computeAppearsIn(t.id);
  if(!list.length)return"";
  return `<div class="aside-box"><h4>↪ ${tr("appears_in")}</h4><div class="appears">${list.map(a=>`<a onclick="${a.id?`openTopic('${a.id}')`:''}">${esc(a.label)}</a>`).join("")}</div></div>`;
}
function computeAppearsIn(id){
  const out=[];const seen=new Set();
  // explicit references stored on topic
  (topic(id).appearsIn||[]).forEach(a=>{out.push(a);});
  // topics that link to this one (programs/days referencing core topics)
  S.topics.forEach(t=>{if((t.links||[]).includes(id)){const lbl=pathOf(t.id).map(x=>x.title).join(" › ");if(!seen.has(lbl)){seen.add(lbl);out.push({label:lbl,id:t.id});}}});
  // documents referencing
  S.files.forEach(f=>{if(f.kind==="document"&&(f.topicIds||[]).includes(id)){if(!seen.has(f.name)){seen.add(f.name);out.push({label:f.name});}}});
  return out;
}

function pickFiles(kind){const i=document.createElement("input");i.type="file";i.multiple=true;
  i.accept=kind==="image"?"image/*":kind==="video"?"video/*":"*/*";
  i.onchange=()=>handleFiles([...i.files],kind);i.click();}
function setupDrop(id,kind){const dz=$("#"+id);if(!dz)return;
  ["dragover","dragenter"].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",ev=>handleFiles([...ev.dataTransfer.files],kind));}
async function handleFiles(files,kind){
  for(const file of files){
    const k=kind||(file.type.startsWith("image")?"image":file.type.startsWith("video")?"video":"document");
    const ext=(file.name.split(".").pop()||"").toLowerCase();
    /* Phase 4: store the Blob directly (no base64) — far lower memory, supports large PDFs/videos */
    const rec={id:nid("file"),kind:k,name:file.name,ext,size:file.size,type:file.type,mime:file.type,blob:file,topicIds:[S.currentTopic],addedAt:now()};
    S.files.set(rec.id,rec);await DB.put("files",rec);pushRecent(k==="image"?"image":k==="video"?"video":"document",rec.id);
  }
  renderDetail();toast(`${files.length} ${kind} added`,"📎");
}
function openFile(id){const f=S.files.get(id);if(!f)return;pushRecent("document",id);const src=fileSrc(f);
  const w=window.open();if(w){w.document.write(`<iframe src="${src}" style="position:fixed;inset:0;width:100%;height:100%;border:0"></iframe><title>${esc(f.name)}</title>`);}else{const a=document.createElement("a");a.href=src;a.download=f.name;a.click();}}
async function delFile(id){if(!confirm("Remove this file?"))return;revokeFileSrc(id);S.files.delete(id);await DB.del("files",id);renderDetail();toast("File removed","🗑");}
function addVideoPrompt(topicId){const u=prompt("Paste a YouTube or Vimeo URL:");if(!u)return;
  const embed=ytEmbed(u);const name=prompt("Title for this video:","Video")||"Video";

function ytEmbed(u){let m=u.match(/(?:youtu\.be\/|v=)([\w-]{11})/);if(m)return`https://www.youtube.com/embed/${m[1]}`;m=u.match(/vimeo\.com\/(\d+)/);if(m)return`https://player.vimeo.com/video/${m[1]}`;return u;}

  const esc2=s=>s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const termRx=terms.map(term=>new RegExp(esc2(term),"g"));

function physicsStep(){
  const cx=innerWidth/2,cy=innerHeight/2;const N=TG.nodes;
  for(let i=0;i<N.length;i++){const a=N[i];a.vx+=(cx-a.x)*0.0012;a.vy+=(cy-a.y)*0.0012;
    for(let j=i+1;j<N.length;j++){const b=N[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy||0.01;let d=Math.sqrt(d2);
      const rep=9000/d2;const fx=dx/d*rep,fy=dy/d*rep;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}}
  TG.edges.forEach(e=>{const a=TG.nodes.find(n=>n.id===e.a),b=TG.nodes.find(n=>n.id===e.b);if(!a||!b)return;
    let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||0.01;const f=(d-150)*0.01;const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  N.forEach(n=>{if(n===TG.drag)return;n.vx*=0.86;n.vy*=0.86;n.x+=n.vx;n.y+=n.vy;if(n.id===TG.focus){n.x+=(cx-n.x)*0.08;n.y+=(cy-n.y)*0.08;}});
}
function toScreen(n){return{x:(n.x+TG.cam.x)*TG.cam.z+(1-TG.cam.z)*innerWidth/2,y:(n.y+TG.cam.y)*TG.cam.z+(1-TG.cam.z)*innerHeight/2};}
function drawGraph(){
  const ctx=TG.ctx;if(!ctx)return;ctx.clearRect(0,0,innerWidth,innerHeight);
  TG.edges.forEach(e=>{const a=TG.nodes.find(n=>n.id===e.a),b=TG.nodes.find(n=>n.id===e.b);if(!a||!b)return;
    const pa=toScreen(a),pb=toScreen(b);const col=confColor(e.confidence||"verified");
    const onPath=TG.pathSet&&TG.pathSet.has(e.a+"|"+e.b),sel=TG.selectedEdge===e;
    ctx.globalAlpha=onPath||sel?1:.62;
    ctx.strokeStyle=onPath?"#d8b664":sel?"#ffffff":col;
    ctx.lineWidth=(onPath?4:sel?3:e.verified?2:1.6)*TG.cam.z;
    if(!e.verified&&!onPath&&!sel)ctx.setLineDash([6,5]);else ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    const lbl=e.relType||e.label; if(lbl&&TG.cam.z>0.6){const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;ctx.fillStyle="rgba(231,239,227,.6)";ctx.font=`${11*TG.cam.z}px Segoe UI`;ctx.textAlign="center";ctx.fillText(lbl,mx,my-4);}
  });
  TG.nodes.forEach(n=>{const p=toScreen(n);const t=topic(n.id);const r=n.r*TG.cam.z;
    const isFocus=n.id===TG.focus,isHover=n===TG.hover,isPathEnd=TG.pathA===n.id;
    const grd=ctx.createRadialGradient(p.x-r*0.3,p.y-r*0.3,r*0.2,p.x,p.y,r);
    if(isFocus){grd.addColorStop(0,"#f0d98a");grd.addColorStop(1,"#c39a3c");}else{grd.addColorStop(0,"#7fc18f");grd.addColorStop(1,"#2c6b3e");}
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,7);ctx.fillStyle=grd;ctx.fill();
    ctx.lineWidth=isHover||isPathEnd?3:1.5;ctx.strokeStyle=isPathEnd?"#d8b664":isFocus?"#fff5d8":"rgba(255,255,255,.5)";ctx.stroke();
    ctx.fillStyle=isFocus?"#fff":"rgba(231,239,227,.92)";ctx.textAlign="center";ctx.textBaseline="top";
    ctx.font=`${isFocus?'600 ':''}${(isFocus?15:12.5)*TG.cam.z}px Segoe UI`;
    ctx.fillText(t?t.title:"?",p.x,p.y+r+4);
  });
}
function nodeAt(mx,my){for(let i=TG.nodes.length-1;i>=0;i--){const n=TG.nodes[i];const p=toScreen(n);if(Math.hypot(mx-p.x,my-p.y)<=n.r*TG.cam.z+4)return n;}return null;}
function distToSeg(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy||1;let t=((px-x1)*dx+(py-y1)*dy)/l2;t=Math.max(0,Math.min(1,t));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));}
function edgeAt(mx,my){let best=null,bestD=8;for(const e of TG.edges){const a=TG.nodes.find(n=>n.id===e.a),b=TG.nodes.find(n=>n.id===e.b);if(!a||!b)continue;const pa=toScreen(a),pb=toScreen(b);const d=distToSeg(mx,my,pa.x,pa.y,pb.x,pb.y);if(d<bestD){bestD=d;best=e;}}return best;}
function setupGraphEvents(){
  const c=TG.canvas;
  c.onmousedown=e=>{const n=nodeAt(e.clientX,e.clientY);if(n){TG.drag=n;}else{TG.pan={x:e.clientX,y:e.clientY,cx:TG.cam.x,cy:TG.cam.y};}};
  c.onmousemove=e=>{TG.hover=nodeAt(e.clientX,e.clientY);c.style.cursor=TG.hover?"pointer":(edgeAt(e.clientX,e.clientY)?"crosshair":(TG.pan?"grabbing":"grab"));
    if(TG.drag){const inv=1/TG.cam.z;TG.drag.x=(e.clientX-(1-TG.cam.z)*innerWidth/2)*inv-TG.cam.x;TG.drag.y=(e.clientY-(1-TG.cam.z)*innerHeight/2)*inv-TG.cam.y;TG.drag.vx=0;TG.drag.vy=0;}
    else if(TG.pan){TG.cam.x=TG.pan.cx+(e.clientX-TG.pan.x)/TG.cam.z;TG.cam.y=TG.pan.cy+(e.clientY-TG.pan.y)/TG.cam.z;}};
  c.onmouseup=()=>{TG.drag=null;TG.pan=null;};
  c.onclick=e=>{const n=nodeAt(e.clientX,e.clientY);
    if(n){ if(TG.pathMode){ if(!TG.pathA){TG.pathA=n.id;toast(L()==="hi"?"लक्ष्य नोड चुनें":"Pick the target node","🔀");} else { computePath(TG.pathA,n.id);TG.pathA=null;TG.pathMode=false;renderThreadControls(); } }
      else if(n.id!==TG.focus){setFocus(n.id);} return; }
    const ed=edgeAt(e.clientX,e.clientY); if(ed){TG.selectedEdge=ed;renderInspector(ed);} };
  c.ondblclick=e=>{const n=nodeAt(e.clientX,e.clientY);if(n){openThreadsToTopic(n.id);}};
  c.onwheel=e=>{e.preventDefault();const f=e.deltaY<0?1.12:0.9;TG.cam.z=Math.max(0.3,Math.min(3,TG.cam.z*f));};
  window.onresize=()=>{if(S.view==="threads")resizeGraph();};
}
function computePath(aId,bId){
  const adj=new Map();S.threads.forEach(e=>{(adj.get(e.a)||adj.set(e.a,[]).get(e.a)).push(e.b);(adj.get(e.b)||adj.set(e.b,[]).get(e.b)).push(e.a);});
  const prevm={};const q=[aId];const seen=new Set([aId]);let found=false;
  while(q.length){const cur=q.shift();if(cur===bId){found=true;break;}(adj.get(cur)||[]).forEach(nx=>{if(!seen.has(nx)){seen.add(nx);prevm[nx]=cur;q.push(nx);}});}
  if(!found){toast(L()==="hi"?"कोई पथ नहीं मिला":"No path found","🔀");return;}
  const path=[bId];let cur=bId;while(cur!==aId){cur=prevm[cur];path.unshift(cur);}
  buildGraphFromIds(path,aId);TG.pathSet=new Set();for(let i=0;i<path.length-1;i++){TG.pathSet.add(path[i]+"|"+path[i+1]);TG.pathSet.add(path[i+1]+"|"+path[i]);}
  TG.focus=aId;renderFocusCard();toast((L()==="hi"?"सबसे छोटा पथ: ":"Shortest path: ")+path.length+(L()==="hi"?" नोड":" nodes"),"🔀");
}

/* ---- 1. Trace Knowledge: Topic → Block → Evidence → Source → Document → Page → Original text ---- */

  const b=S.knowledge.get(blockId); if(!b)return; const hi=L()==="hi";
  const t=topic(b.topicId);
  const evRows=(b.evidence||[]).map(ev=>{ const s=ev.sourceId?source(ev.sourceId):null; const f=s&&s.fileId?S.files.get(s.fileId):null;

    </div>`; }).join("");

/* ---- 2. Knowledge Evolution: a git-like history of a block ---- */
async function knowledgeEvolution(blockId){
  const b=S.knowledge.get(blockId); if(!b)return; const hi=L()==="hi";
  const versions=(await DB.getAll("versions")).filter(v=>v.targetId===blockId);
  const events=(await DB.getAll("events")).filter(e=>e.blockId===blockId);
  const steps=[];
  steps.push({ts:b.created,label:hi?"बनाया गया":"Created",by:b.origin==="ai"?"AI":"User"});
  events.forEach(e=>steps.push({ts:e.date,label:hi?"कोर में स्वीकृत":"Accepted into Core",by:"governance"}));
  versions.forEach(v=>steps.push({ts:v.ts,label:hi?"संस्करण सहेजा":"Version saved",by:v.editor||"user"}));
  if((b.evidence||[]).length)steps.push({ts:b.updated,label:(b.evidence.length)+" "+(hi?"प्रमाण संलग्न":"evidence attached")});
  if((b.principleIds||[]).length)steps.push({ts:b.updated,label:(hi?"सिद्धांत जोड़े":"principles linked")});
  steps.push({ts:b.updated,label:hi?"वर्तमान":"Current",by:b.origin==="ai"?"AI":"User"});
  steps.sort((a,b)=>a.ts-b.ts);
  modal(`<h2>🕓 ${hi?"ज्ञान विकास":"Knowledge Evolution"}</h2><p class="msub">${esc(b.statement)}</p>
    <div class="evo-list">${steps.map(s=>`<div class="evo-step"><span class="evo-dot"></span><div class="evo-body"><b>${esc(s.label)}</b><span class="evo-meta">${new Date(s.ts).toLocaleString()}${s.by?" · "+esc(s.by):""}</span></div></div>`).join("")}</div>`);
}

/* ---- 3. Dependency Intelligence ---- */
async function computeDependents(topicId){
  const descendants=[]; (function walk(pid){children(pid).forEach(c=>{descendants.push(c);walk(c.id);});})(topicId);
  const blocks=knowledgeOf(topicId);
  const programs=[...S.topics.values()].filter(t=>(t.links||[]).includes(topicId));
  const rels=threadsOf(topicId);
  const events=(await DB.getAll("events")).filter(e=>e.topicId===topicId);
  const research=(await DB.getAll("research")).filter(r=>(r.collected||[]).some(it=>it.type==="topic"&&it.id===topicId));
  const principles=new Set(blocks.flatMap(b=>b.principleIds||[])).size;
  return {descendants,blocks:blocks.length,programs,rels:rels.length,events:events.length,research:research.length,principles};
}
async function computeInfluence(topicId){
  // downstream: what this topic influences via outgoing scientific/educational relationships + references
  const infl=threadsOf(topicId).map(e=>e.a===topicId?e.b:e.a).map(id=>topic(id)).filter(Boolean);
  const programs=[...S.topics.values()].filter(t=>(t.links||[]).includes(topicId));
  const research=(await DB.getAll("research")).filter(r=>(r.collected||[]).some(it=>it.type==="topic"&&it.id===topicId));
  return {topics:infl,programs,research:research.length};
}

async function performDeleteTopic(id){ const t=topic(id); if(!t)return;

async function sha256(text){ try{ const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(text)); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join(""); }
  catch(e){ let h=0; for(let i=0;i<text.length;i++) h=(h*31+text.charCodeAt(i))|0; return "h"+(h>>>0).toString(16); } }
async function getProcessed(){ return (await DB.get("meta","processed"))||{key:"processed",map:{}}; }

/* ---- self-contained offline extractor (runs in a Web Worker; pure, no external refs) ---- */
function _wkExtract(payload){
  const text=payload.text||"";
  const facts=[]; const add=(l,v)=>{ v=(""+v).trim(); if(v&&!facts.some(f=>f.label===l&&f.value===v))facts.push({label:l,value:v}); };
  (text.match(/\b\d+\s*(?:min(?:ute)?s?|hours?)\b/gi)||[]).slice(0,6).forEach(x=>add("Duration",x));
  (text.match(/\b\d{2,5}\s+(?:participants|students|subjects|people)\b/gi)||[]).slice(0,4).forEach(x=>add("Participants",x));
  (text.match(/\b\d{1,3}\s?%/g)||[]).slice(0,6).forEach(x=>add("Percentage",x));
  (text.match(/\b(?:19|20)\d{2}\b/g)||[]).slice(0,6).forEach(x=>add("Year",x));
  (text.match(/\b(?:BHU|SIET|PMSEH)\b/g)||[]).slice(0,4).forEach(x=>add("Institution/Assessment",x));
  const sentences=text.replace(/\s+/g," ").split(/(?<=[.!?।])\s+/).map(s=>s.trim()).filter(s=>s.length>25&&s.length<320);
  const blocks=[]; const seen={};
  for(const s of sentences){ const low=s.toLowerCase(); let type=null,conf=0.5;
    if(/(benefit|improv|reduc|increas|boost|helps|enhanc|lowers|strengthen)/.test(low)){type="benefit";conf=0.6;}
    else if(/(study|studies|research|trial|shown|found that|according to|participants|et al|\b20\d\d\b)/.test(low)){type="finding";conf=0.62;}
    else if(/^(step|first|then|next|finally|inhale|exhale|breathe)/.test(low)||/^\d+[.\)]/.test(s)){type="procedure";conf=0.55;}
    else if(/( is | are |means|defined as|refers to)/.test(low)){type="definition";conf=0.5;}
    if(!type)continue; const key=low.slice(0,50); if(seen[key])continue; seen[key]=1;
    blocks.push({statement:s,type,evidence:[],confidence:{extraction:conf,interpretation:0,overall:conf},reasoning:"Offline heuristic matched a '"+type+"' pattern in the source text.",principles:[],topicHint:""});
    if(blocks.length>=14)break; }
  return {facts,blocks};
}
let _extractWorker=null;
function offlineExtractAsync(text){
  try{ if(!_extractWorker)_extractWorker=EKOSWorker.spawn(_wkExtract); return _extractWorker.call({text}); }
  catch(e){ return Promise.resolve(_wkExtract({text})); }
}
function disposeExtractWorker(){ if(_extractWorker){ try{_extractWorker.terminate();}catch(e){} _extractWorker=null; } }

STAGE 1 — FACTS only (verbatim data, no interpretation): durations, counts, %, years, institutions, assessment names, places, funding, authorship.
STAGE 2 — atomic KNOWLEDGE BLOCKS. Each block = ONE self-contained claim with evidence quoted from the text.
Return ONLY valid JSON, no prose:
{"facts":[{"label":"","value":""}],
 "blocks":[{"statement":"","type":"statement|definition|benefit|procedure|finding","evidence":[{"text":""}],
  "confidence":{"extraction":0.0,"interpretation":0.0,"overall":0.0},"reasoning":"why created","principles":["short name"],"topicHint":"Eco-Skills area"}]}
SOURCE:
${text}`; }
async function _llmFetch(url,opts){ const ac=new AbortController(); const to=setTimeout(()=>ac.abort(),90000);   // defect-fix: a stalled provider request must not hang the pipeline forever; abort → transient → retry/resume
  try{ return await fetch(url,Object.assign({},opts,{signal:ac.signal})); } finally{ clearTimeout(to); } }
async function callLLM(prompt){
  const s=normalizeAISettings(), p=s.provider, model=s.model||PROVIDER_MODELS[p];
  if(p==="claude"){ const r=await _llmFetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":s.keys.claude,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model,max_tokens:4000,temperature:s.temperature,messages:[{role:"user",content:prompt}]})}); if(!r.ok)throw new Error("Claude "+r.status); const d=await r.json(); return d.content.map(c=>c.text||"").join(""); }
  if(p==="openai"){ const r=await _llmFetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+s.keys.openai},body:JSON.stringify({model,temperature:s.temperature,messages:[{role:"user",content:prompt}]})}); if(!r.ok)throw new Error("OpenAI "+r.status); const d=await r.json(); return d.choices[0].message.content; }
  if(p==="gemini"){ const r=await _llmFetch("https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent?key="+encodeURIComponent(s.keys.gemini),{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:s.temperature,maxOutputTokens:16384,responseMimeType:"application/json",thinkingConfig:{thinkingBudget:0}}})}); if(!r.ok)throw new Error("Gemini "+r.status); const d=await r.json(); return (d.candidates[0].content.parts||[]).map(x=>x.text||"").join(""); }
  if(p==="ollama"){ const r=await _llmFetch((s.ollamaUrl||"http://localhost:11434")+"/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({model,stream:false,options:{temperature:s.temperature},messages:[{role:"user",content:prompt}]})}); if(!r.ok)throw new Error("Ollama "+r.status); const d=await r.json(); return d.message.content; }
  throw new Error("no provider"); }
function parseJSON(txt){ const m=txt.match(/\{[\s\S]*\}/); return JSON.parse(m?m[0]:txt); }

/* ---- transient-error retry (rate limits) — reuses callLLM, no new stores/entities ---- */
let LLM_RETRY_DELAYS=[30000,60000,120000];   // Attempt1 → 30s → 2 → 60s → 3 → 120s → Retry Failed (tunable for tests)
function isTransientErr(e){ if(!e)return false; if(e.kind==="malformed")return false; const m=e.message||"";
  if(/\b(429|500|502|503|504)\b/.test(m))return true;                         // rate-limit / transient server
  if(e.name==="TypeError"||/Failed to fetch|NetworkError|network|timeout|aborted/i.test(m))return true; // network/timeout
  return false; }                                                              // 400/401/403 (auth/bad request) → NOT transient
async function callLLMRetry(prompt,onStatus){ let last;
  for(let i=0;i<=LLM_RETRY_DELAYS.length;i++){
    if(i===0){ onStatus&&onStatus("Running"); }
    else { onStatus&&onStatus("Retrying ("+i+"/"+LLM_RETRY_DELAYS.length+")"); await new Promise(r=>setTimeout(r,LLM_RETRY_DELAYS[i-1])); }
    try{ return await callLLM(prompt); }
    catch(e){ last=e; if(!isTransientErr(e))throw e; }   // permanent error → fail fast, no retry
  }
  const err=new Error("Retry Failed"+(last?": "+last.message:"")); err.retryFailed=true; err.kind="retry-failed"; throw err;
}

/* ---- adapter: extract() returns facts + atomic blocks + provenance metadata ---- */
const AI={
  async extract(text, sourceName){
    const s=normalizeAISettings();
    const base={provider:s.provider,model:s.model||PROVIDER_MODELS[s.provider],promptVersion:PROMPT_VERSION,timestamp:now(),source:sourceName};
    if(aiAvailable()){
      const raw=await callLLMRetry(extractionPrompt(text.slice(0,s.chunkSize)), st=>{ if(typeof setPipe==="function")setPipe(2,"Extracting ("+providerLabel()+"): "+(sourceName||"")+" — "+st); });
      let out; try{ out=parseJSON(raw); }catch(pe){ const err=new Error("Malformed JSON from provider"); err.kind="malformed"; throw err; }   // do NOT silently fall back
      return Object.assign(base,{method:"llm",facts:out.facts||[],blocks:(out.blocks||[]).slice(0,30)});
    }
    const r=await offlineExtractAsync(text);   // offline path runs only when the user has selected the offline provider
    return Object.assign(base,{model:"",method:"offline",facts:r.facts,blocks:r.blocks});
  },
  async semanticQuery(q){ // natural-language → structured terms (AI-optional; caller falls back to keyword)
    if(!aiAvailable()) return null;
    try{ const out=parseJSON(await callLLM(`Convert this question into search keywords for an Eco-Skills knowledge base. Return ONLY JSON {"terms":["",""]}. Question: ${q}`)); return out.terms||null; }
    catch(e){ return null; }
  }
};

function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=()=>rej(new Error("offline or blocked: "+src));document.head.appendChild(s);});}
async function extractPDF(f){

/* placement: match text to an existing top-level branch (auto-categorize) */
function choosePlacement(text){
  const branches=children("root"); const low=(text||"").toLowerCase();
  const cues={ "Physical Health":["breath","respir","water","hydrat","nutri","food","light","body","exercise","movement","oxygen","blood"],
    "Mental Health":["stress","anxiet","mind","cortisol","sleep","mood","emotion","depress","calm","serotonin","dopamine"],
    "Self Awareness":["aware","mindful","observ","reflect","introspect","conscious","feeling"],
    "Eco-Centralization":["focus","concentrat","attention","centra","present"],
    "Holistic Personality Development":["personality","character","values","social","relationship","habit","growth"]};
  let best=null,bestScore=0.12;
  branches.forEach(b=>{ let sc=similarity((text||"").slice(0,48),b.title)*0.3; (cues[b.title]||[]).forEach(w=>{if(low.includes(w))sc+=0.22;}); if(sc>bestScore){bestScore=sc;best=b;} });
  return best||branches[0]||topic("root");
}

/* ---- proposal generation (KI-2: nothing enters the Core here) ---- */
async function makeProposalsFromDoc(doc,srcId){
  const ex=await AI.extract(doc.text,doc.name); const out=[];
  for(const b of ex.blocks){
    if(_ingestCancel)break;
    const placement=choosePlacement(b.statement+" "+(b.topicHint||""));
    let dup=null,dupScore=0; S.knowledge.forEach(k=>{const sc=similarity(b.statement,k.statement);if(sc>dupScore){dupScore=sc;dup=k;}});
    let conflict=null; const dur=(b.statement.match(/\b\d+\s*(?:min(?:ute)?s?|hours?)\b/i)||[])[0];
    if(dur && (S.meta.settings.toggles?S.meta.settings.toggles.conflictDetection!==false:true)){
      knowledgeOf(placement.id).forEach(k=>{ const kd=(k.statement.match(/\b\d+\s*(?:min(?:ute)?s?|hours?)\b/i)||[])[0];
        if(kd && kd.toLowerCase()!==dur.toLowerCase() && similarity(b.statement,k.statement)>0.4){ conflict={blockId:k.id,reason:`Duration differs: “${dur}” vs “${kd}”`}; } }); }
    const overall=(b.confidence&&b.confidence.overall)||(ex.method==="llm"?0.7:0.55);
    const level=ex.method==="offline"?(overall>=0.6?"ai-med":"ai-low"):(overall>=0.8?"ai-high":overall>=0.6?"ai-med":"ai-low");
    const prop={ id:nid("prop"), op:"add", topicId:placement.id, status:"pending",
      provider:ex.provider, model:ex.model, promptVersion:ex.promptVersion, method:ex.method, createdAt:now(),
      reasoning:b.reasoning||"", facts:ex.facts, sourceIds:[srcId],
      confidence:{extraction:(b.confidence&&b.confidence.extraction)||overall, interpretation:(b.confidence&&b.confidence.interpretation)||0, overall, level},
      block:{ statement:b.statement, type:b.type||"statement", confidence:level,
        evidence:(b.evidence||[]).filter(e=>e&&e.text).map(e=>({text:e.text,sourceId:srcId,locator:""})),
        sources:[{sourceId:srcId,locator:""}], principleTitles:(b.principles||[]).slice(0,3) },
      duplicateOf: (dup&&dupScore>0.55)?{id:dup.id,score:Math.round(dupScore*100)}:null,
      conflictWith: conflict };
    await DB.put("proposals",prop); out.push(prop);
    if(conflict){ await DB.put("conflicts",{id:nid("conf"),topicId:placement.id,blockIds:[conflict.blockId],proposalId:prop.id,reason:conflict.reason,status:"open",createdAt:now()}); }
  }
  return out;
}

async function runPipeline(docs){
  _ingestCancel=false; modalPipeline();
  let total=0,skipped=0,failed=0;
  setPipe(0,"Reading "+docs.length+" source"+(docs.length>1?"s":"")+"…"); await tick(250);
  for(const doc of docs){
    if(_ingestCancel)break;
    setPipe(1,"Parsing: "+doc.name); await tick(120);
    const hash=await sha256((doc.text||doc.name).slice(0,200000));
    const processed=await getProcessed();
    if(processed.map[hash]){ skipped++; continue; }       // AI processing memory: skip identical docs
    // provenance: store the uploaded file as a Blob + a Source (user's document, not an AI claim)
    let fileId=null;
    if(doc.file){ const ext=(doc.name.split(".").pop()||"").toLowerCase();
      const frec={id:nid("file"),kind:"document",name:doc.name,ext,size:doc.size||0,type:doc.type||"",mime:doc.type||"",blob:doc.file,topicIds:["root"],addedAt:now()};
      S.files.set(frec.id,frec); await DB.put("files",frec); fileId=frec.id; }
    const src=newSource({title:doc.name,kind:"document",fileId}); await saveSource(src);
    setPipe(2,"Extracting ("+providerLabel()+"): "+doc.name+" — Queued"); await tick(120);
    try{
      const props=await makeProposalsFromDoc(doc,src.id); total+=props.length;
      await markProcessed(hash,{provider:S.meta.settings.provider,model:S.meta.settings.model||"",date:now(),blocks:props.length,source:doc.name});
    }catch(e){
      failed++;
      // no silent offline fallback; undo this doc's Source/file so a later resume creates no duplicate, and don't mark processed (retryable)
      S.sources.delete(src.id); await DB.del("sources",src.id);
      for(const v of await DB.getAll("versions")) if(v.targetId===src.id) await DB.del("versions",v.id);   // remove orphan version records of the rolled-back Source (no dup chains on resume)
      if(fileId){ S.files.delete(fileId); await DB.del("files",fileId); }
      if(e.kind==="retry-failed" && !_failedDocs.some(d=>d.name===doc.name && (d.text||"")===(doc.text||"")))_failedDocs.push(doc);  // keep in queue for Resume (dedup)
      const why=e.kind==="retry-failed"?"Retry Failed — provider rate-limited; try later or switch to offline in Settings"
        :e.kind==="malformed"?"Failed — malformed provider response"
        :"Failed — "+(e.message||"provider error");
      setPipe(2,"✕ "+doc.name+" — "+why); await tick(800);
    }
  }
  setPipe(3,"Proposing…"); await tick(180); disposeExtractWorker();
  setPipe(4,_ingestCancel?"Cancelled.":("Completed · "+total+" proposal"+(total!==1?"s":"")+(skipped?(" · "+skipped+" already processed"):"")+(failed?(" · "+failed+" Retry Failed"):"")+".")); await tick(failed?900:250);
  if(_ingestCancel){ closeModal(); toast("Ingestion cancelled","⏹"); return; }
  if(_failedDocs.length){ // keep the queue; let the user resume exactly where it stopped
    const hi=L()==="hi"; const foot=document.querySelector("#modal-root .modal .row");
    if(foot)foot.innerHTML=`<button class="btn" onclick="closeModal();openReview()">${hi?"समीक्षा करें →":"Review proposals →"}</button>
      <button class="btn primary" onclick="resumeFailedImports()">↻ ${hi?"विफल आयात फिर से चलाएँ":"Resume Failed Imports"} (${_failedDocs.length})</button>`;
    toast((total?total+" ready · ":"")+_failedDocs.length+" awaiting resume (rate limit)","⚠");
    return; }
  closeModal(); openReview();
  toast(total+" proposal"+(total!==1?"s":"")+" ready for review","✨");
}

async function acceptProposal(id,skipRender){
  const p=await DB.get("proposals",id); if(!p||p.status!=="pending")return;
  const pids=[]; for(const title of (p.block.principleTitles||[])){ if(!title)continue; let pr=principleByTitle(title); if(!pr){pr=newPrinciple({title});await savePrinciple(pr);} if(!pids.includes(pr.id))pids.push(pr.id); }
  const block=newBlock({ topicId:p.topicId, statement:p.block.statement, type:p.block.type, confidence:p.block.confidence||(p.confidence&&p.confidence.level)||"ai-med",
    origin:"ai", sources:p.block.sources||[], evidence:p.block.evidence||[], principleIds:pids });
  await saveBlock(block);
  await DB.put("versions",{id:nid("ver"),targetId:block.id,kind:"knowledge",ts:now(),editor:"ai",provider:p.provider,model:p.model,snapshot:{statement:block.statement,type:block.type,confidence:block.confidence}});
  await DB.put("events",{id:nid("evt"),date:now(),type:"knowledge",title:"Accepted: "+block.statement.slice(0,70),topicId:p.topicId,sourceId:(p.sourceIds||[])[0],blockId:block.id,proposalId:p.id});
  await addAudit({action:"accept",proposalId:p.id,blockId:block.id,topicId:p.topicId,provider:p.provider,model:p.model});
  p.status="accepted"; p.acceptedBlockId=block.id; await DB.put("proposals",p);
  if(skipRender)return; RV.sel.delete(id);
  toast(L()==="hi"?"स्वीकृत — ज्ञान कोर में जोड़ा गया":"Accepted — added to Knowledge Core","✓");
  renderReview();
}

/* ---- Knowledge Health (the status page) ---- */
async function computeHealth(){
  const [props,confs]=await Promise.all([DB.getAll("proposals"),DB.getAll("conflicts")]);
  const topicsAll=[...S.topics.values()].filter(t=>t.id!=="root");
  const covered=topicsAll.filter(t=>knowledgeOf(t.id).length>0 || (t.structured&&(t.structured.description||"").trim())).length;
  const coverage=topicsAll.length?Math.round(covered/topicsAll.length*100):0;
  const pending=props.filter(p=>p.status==="pending").length;
  const dup=props.filter(p=>p.status==="pending"&&p.duplicateOf).length;
  const conflicts=confs.filter(c=>c.status==="open").length;
  let missingSources=0,broken=0;
  S.knowledge.forEach(b=>{ if(!(b.sources&&b.sources.length))missingSources++; (b.sources||[]).forEach(r=>{ if(!S.sources.get(r.sourceId))broken++; }); });
  return {coverage,covered,total:topicsAll.length,pending,dup,conflicts,missingSources,broken};
}

/* ---- Trust Score (Phase 7a): more meaningful than a single confidence ---- */
function computeTrust(topicId){
  const blocks=knowledgeOf(topicId); const s=(topic(topicId)||{}).structured||{};
  const srcIds=new Set(); blocks.forEach(b=>(b.sources||[]).forEach(r=>srcIds.add(r.sourceId)));
  const sources=srcIds.size;
  // evidence credits both atomic blocks' evidence AND seeded structured research
  const evidence=blocks.reduce((n,b)=>n+((b.evidence||[]).length),0)+((s.research||[]).length);
  const principles=new Set(blocks.flatMap(b=>b.principleIds||[])).size;
  const verified=blocks.filter(b=>b.confidence==="verified").length;
  let score=0;
  score+=Math.min(30,blocks.length*9);
  score+=Math.min(26,sources*10);
  score+=Math.min(18,evidence*5);
  score+=Math.min(12,principles*6);
  score+=Math.min(8,verified*5);
  if((s.description||"").trim())score+=8;                 // structured authored content
  if((s.benefits||[]).length||(s.procedure||[]).length)score+=6;
  return {score:Math.min(100,Math.round(score)),sources,evidence,principles,blocks:blocks.length,verified};
}

  const col=r.score>=80?"#3c8a52":r.score>=50?"#c9871f":r.score>=20?"#9a7a23":"#8a8f88";
  return `<div class="aside-box"><h4>🛡 ${hi?"विश्वास स्कोर":"Trust Score"}</h4>
    <div class="trust-row"><div class="trust-score" style="color:${col}">${r.score}%</div>

}

  const [questions,sessions,collections]=await Promise.all([DB.getAll("questions"),DB.getAll("research"),DB.getAll("collections")]);
  const gaps=await computeGaps();
  host.innerHTML=`
    <div class="crumbs"><a onclick="openTopic('root')">Eco-Skills</a><span class="sep">›</span><span style="color:var(--forest-800);font-weight:700">🔬 ${hi?"शोध स्टूडियो":"Research Studio"}</span></div>
    <div class="topic-head"><div class="th-ico">🔬</div><h1 class="topic-title">${hi?"शोध स्टूडियो":"Research Studio"}</h1>
      <div style="margin-left:auto;display:flex;gap:8px"><button class="btn sm" onclick="openAnalytics()">📊 ${hi?"विश्लेषण":"Analytics"}</button><button class="btn sm" onclick="openCitationGraph()">🕸 ${hi?"उद्धरण ग्राफ़":"Citation Graph"}</button></div></div>

    <div class="aside-box"><h4>🕳 ${hi?"ज्ञान अंतराल":"Knowledge Gaps"}</h4>
      <div class="gap-grid">
        ${gapStat(gaps.topicsNoEvidence.length,hi?"विषय बिना प्रमाण":"Topics w/o evidence")}
        ${gapStat(gaps.questionsOpen,hi?"अनुत्तरित प्रश्न":"Open questions")}
        ${gapStat(gaps.blocksNoSource,hi?"ब्लॉक बिना स्रोत":"Blocks w/o sources")}
        ${gapStat(gaps.openConflicts,hi?"खुले विरोधाभास":"Open conflicts")}
      </div>

    </div>

    <div class="section-label">${hi?"शोध प्रश्न":"Research Questions"} <button class="btn sm" style="float:right" onclick="newQuestionPrompt()">＋ ${hi?"प्रश्न":"Question"}</button></div>
    <div class="q-list">${questions.length?questions.sort((a,b)=>b.updatedAt-a.updatedAt).map(q=>questionCard(q,sessions)).join(""):`<div class="empty-hint" style="color:var(--muted);background:none;border-color:var(--line)">${hi?"कोई शोध प्रश्न नहीं। एक प्रश्न से शोध सत्र शुरू करें।":"No research questions yet. Start a question to open a research session."}</div>`}</div>

    <div class="q-list">${collections.length?collections.map(c=>`<div class="q-card" onclick="openCollection('${c.id}')"><div class="q-top"><b>🗃 ${esc(c.name)}</b><span class="q-meta">${(c.items||[]).length} ${hi?"आइटम":"items"}</span></div></div>`).join(""):`<div class="empty-hint" style="color:var(--muted);background:none;border-color:var(--line)">${hi?"कोई संग्रह नहीं।":"No collections yet."}</div>`}</div>`;
}
function gapStat(n,label){ return `<div class="gap-stat ${n>0?"has":""}"><div class="gap-num">${n}</div><div class="gap-lbl">${esc(label)}</div></div>`; }
function questionCard(q,sessions){ const hi=rhi(); const s=(sessions||[]).find(x=>x.questionId===q.id);
  const statusColor={open:"#8a8f88",investigating:"#c9871f",answered:"#3c8a52"}[q.status]||"#8a8f88";
  return `<div class="q-card" onclick="openQuestion('${q.id}')">
    <div class="q-top"><b>${esc(q.text)}</b><span class="q-status" style="background:${statusColor}22;color:${statusColor}">${q.status}</span></div>
    <div class="q-meta">${s?((s.collected||[]).length+" "+(hi?"प्रमाण":"evidence")):(hi?"सत्र शुरू करें":"start session")}</div></div>`;
}

/* ---- Research Question + session ---- */
async function newQuestionPrompt(){ const txt=prompt(rhi()?"शोध प्रश्न:":"Research question:"); if(!txt||!txt.trim())return;
  const q=newQuestion({text:txt.trim(),status:"open"}); await DB.put("questions",q);
  const ses=newResearch({questionId:q.id,name:txt.trim().slice(0,60)}); await DB.put("research",ses);
  STUDIO.sessionId=ses.id; renderStudio(); }
async function openQuestion(qid){ const sessions=await DB.getAll("research"); let s=sessions.find(x=>x.questionId===qid);
  if(!s){ s=newResearch({questionId:qid}); const q=await DB.get("questions",qid); if(q)s.name=q.text.slice(0,60); await DB.put("research",s); }
  STUDIO.sessionId=s.id; renderStudio(); }
async function setQuestionStatus(qid,st){ const q=await DB.get("questions",qid); if(!q)return; q.status=st; q.updatedAt=now(); await DB.put("questions",q); }
async function newCollectionPrompt(){ const n=prompt(rhi()?"संग्रह का नाम:":"Collection name:"); if(!n)return; await DB.put("collections",newCollection({name:n.trim()})); renderStudio(); }
async function openCollection(cid){ const c=await DB.get("collections",cid); if(!c)return; const hi=rhi();
  modal(`<h2>🗃 ${esc(c.name)}</h2><div class="file-list">${(c.items||[]).map(it=>{const r=resolveItem(it);return `<div class="file-row" onclick="closeModal();${r.onclick}"><span class="fico">${r.ico}</span><span class="fname">${esc(r.title)}</span><span class="fmeta">${esc(it.type)}</span></div>`;}).join("")||`<div class="empty-hint">${hi?"खाली संग्रह।":"Empty collection."}</div>`}</div>`); }

function resolveItem(it){
  if(it.type==="topic"){const t=topic(it.id);return{title:t?t.title:"(missing)",ico:t?ticon(t):"🍃",onclick:`openTopic('${it.id}')`};}
  if(it.type==="knowledge"){const b=S.knowledge.get(it.id);return{title:b?b.statement:"(missing)",ico:"🧩",onclick:b?`openTopic('${b.topicId}','overview')`:""};}
  if(it.type==="source"){const s=source(it.id);return{title:s?s.title:"(missing)",ico:"📖",onclick:`openSourceDoc('${it.id}')`};}
  if(it.type==="note"){const n=S.notes.get(it.id);return{title:n?(n.title||"Note"):"(missing)",ico:"📝",onclick:n?`openTopic('${n.topicId}','notes')`:""};}
  return{title:it.id,ico:"•",onclick:""};
}

    <div class="crumbs"><a onclick="openResearch()">🔬 ${hi?"शोध स्टूडियो":"Research Studio"}</a><span class="sep">›</span><span style="color:var(--forest-800);font-weight:700">${esc(s.name||"Session")}</span></div>
    <div class="topic-head"><div class="th-ico">🔬</div>

    <div class="topic-actions">
      ${q?`<select onchange="setQuestionStatusUI('${q.id}',this.value)" style="border:1px solid var(--line-strong);border-radius:999px;padding:5px 10px;background:var(--paper)">
        ${["open","investigating","answered"].map(st=>`<option value="${st}" ${q.status===st?"selected":""}>${st}</option>`).join("")}</select>`:""}
      <div style="flex:1"></div>
      <button class="btn sm" onclick="addEvidenceModal('${sid}')">＋ ${hi?"प्रमाण जोड़ें":"Add evidence"}</button>
      <button class="btn sm" onclick="reproduceSession('${sid}')">🔁 ${hi?"पुनः चलाएँ":"Reproduce"}</button>
      <button class="btn sm" onclick="openCitationGraphSession('${sid}')">🕸 ${hi?"उद्धरण ग्राफ़":"Citation Graph"}</button>
      <button class="btn sm gold" onclick="generateReport('${sid}')">📄 ${hi?"रिपोर्ट":"Report"}</button>
    </div>
    <div class="section-label">${hi?"साक्ष्य बोर्ड":"Evidence Board"}</div>
    <div class="evidence-board">${board||`<div class="empty-hint" style="color:var(--muted);background:none;border-color:var(--line)">${hi?"अभी कोई प्रमाण नहीं — “प्रमाण जोड़ें” से विषय/ज्ञान/स्रोत एकत्र करें।":"No evidence yet — use “Add evidence” to collect topics, knowledge & sources."}</div>`}</div>
    ${lastSnap?`<div style="font-size:12px;color:var(--muted);margin-top:8px">🕓 ${hi?"अंतिम पुनरुत्पादन":"Last reproduced"}: ${new Date(lastSnap.ts).toLocaleString()} · ${lastSnap.count} ${hi?"आइटम":"items"}${(s.queries||[]).length?` · ${(s.queries||[]).length} ${hi?"सहेजी क्वेरी":"saved queries"}`:""}</div>`:""}
    <div class="section-label">${hi?"निष्कर्ष":"Findings"}</div>
    <div class="custom-area"><div class="rt-content" id="findings" contenteditable spellcheck="false" data-empty="${hi?"इस प्रश्न के निष्कर्ष लिखें…":"Write your findings for this question…"}">${s.findings||""}</div></div>`;

async function editQuestionText(sid,text){ const s=await DB.get("research",sid); if(!s)return; const v=(text||"").trim(); if(!v)return;
  s.name=v.slice(0,80); s.updatedAt=now(); await DB.put("research",s);
  if(s.questionId){const q=await DB.get("questions",s.questionId);if(q){q.text=v;q.updatedAt=now();await DB.put("questions",q);}} }
async function setQuestionStatusUI(qid,st){ await setQuestionStatus(qid,st); toast(rhi()?"स्थिति अपडेट":"Status updated","✓"); }

/* ---- collect / uncollect ---- */
async function collectInto(sid,type,id){ const s=await DB.get("research",sid); if(!s)return; s.collected=s.collected||[];
  if(!s.collected.find(x=>x.type===type&&x.id===id)){ s.collected.push({type,id,note:""}); s.updatedAt=now(); await DB.put("research",s); } }
async function uncollect(sid,type,id){ const s=await DB.get("research",sid); if(!s)return; s.collected=(s.collected||[]).filter(x=>!(x.type===type&&x.id===id)); await DB.put("research",s); renderSession(sid); }
async function collectTopic(topicId){ // from a topic page → most recent session (create if none)
  let sessions=await DB.getAll("research"); let s=sessions.sort((a,b)=>b.updatedAt-a.updatedAt)[0];
  if(!s){ s=newResearch({name:rhi()?"त्वरित सत्र":"Quick session"}); await DB.put("research",s); }
  await collectInto(s.id,"topic",topicId); toast(rhi()?"शोध सत्र में जोड़ा":"Added to research session","🔬"); }
function addEvidenceModal(sid){ const hi=rhi();
  modal(`<h2>＋ ${hi?"प्रमाण जोड़ें":"Add evidence"}</h2><p class="msub">${hi?"विषय/ज्ञान/स्रोत खोजें और जोड़ें। क्वेरी सत्र में सहेजी जाती है (पुनरुत्पादन हेतु)।":"Search topics/knowledge/sources and add. The query is saved to the session (for reproducibility)."}</p>
    <input type="text" id="ev-q" placeholder="${hi?"खोजें…":"Search…"}" oninput="evSearch('${sid}',this.value)"/>
    <div id="ev-results" style="max-height:46vh;overflow:auto;margin-top:10px"></div>`);
  setTimeout(()=>{const e=$("#ev-q");if(e)e.focus();},50);
}
function evSearch(sid,q){ q=(q||"").trim(); const el=$("#ev-results"); if(!el)return; if(!q){el.innerHTML="";return;}
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean); const corpus=getCorpus();
  const res=corpus.filter(it=>["topic","knowledge","source"].includes(it.type)).map(it=>{let sc=0;terms.forEach(t=>{if(it._tl.includes(t))sc+=5;if(it._low.includes(t))sc+=1;});return{it,sc};}).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,20);
  el.innerHTML=res.map(({it})=>{const ico=it.type==="topic"?ticon(topic(it.id)):it.type==="knowledge"?"🧩":"📖";
    return `<div class="file-row" onclick="addEvidence('${sid}','${it.type}','${it.id}','${esc(q).replace(/'/g,"")}')"><span class="fico">${ico}</span><span class="fname">${esc(it.title)}</span><span class="fmeta">${it.type}</span></div>`;}).join("")||`<div class="empty-hint">—</div>`;
}
async function addEvidence(sid,type,id,query){ await collectInto(sid,type,id);
  const s=await DB.get("research",sid); if(s){ s.queries=s.queries||[]; if(query&&!s.queries.includes(query))s.queries.push(query); await DB.put("research",s); }
  toast(rhi()?"जोड़ा गया":"Added","➕"); }

/* ---- reproducible sessions ---- */
async function reproduceSession(sid){ const s=await DB.get("research",sid); if(!s)return; const hi=rhi();
  const prevIds=new Set((s.collected||[]).map(x=>x.type+":"+x.id));
  // re-run saved queries against the CURRENT knowledge base, recollect top matches
  const corpus=getCorpus(); let added=0;
  (s.queries||[]).forEach(q=>{ const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
    const top=corpus.filter(it=>["topic","knowledge","source"].includes(it.type)).map(it=>{let sc=0;terms.forEach(t=>{if(it._low.includes(t))sc++;});return{it,sc};}).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,5);
    top.forEach(({it})=>{ if(!(s.collected||[]).find(x=>x.type===it.type&&x.id===it.id)){ s.collected.push({type:it.type,id:it.id,note:"(reproduced)"}); added++; } }); });
  s.snapshots=s.snapshots||[]; s.snapshots.push({ts:now(),count:(s.collected||[]).length,ids:(s.collected||[]).map(x=>x.type+":"+x.id),queries:(s.queries||[]).slice()});
  s.updatedAt=now(); await DB.put("research",s);
  renderSession(sid);
  toast((hi?"पुनरुत्पादित — ":"Reproduced — ")+added+(hi?" नए मिलान":" new matches"),"🔁");
}

/* ---- Knowledge Gap Detection ---- */
async function computeGaps(){
  const confs=await DB.getAll("conflicts"); const questions=await DB.getAll("questions");
  const topicsNoEvidence=[...S.topics.values()].filter(t=>t.id!=="root" && (t.kind==="topic"||t.kind==="branch") && knowledgeOf(t.id).length===0);
  let blocksNoSource=0; S.knowledge.forEach(b=>{ if(!(b.sources&&b.sources.length))blocksNoSource++; });
  return { topicsNoEvidence, questionsOpen:questions.filter(q=>q.status!=="answered").length, blocksNoSource, openConflicts:confs.filter(c=>c.status==="open").length };
}

/* ---- Citation Graph (provenance map: Topic → Knowledge → Source) ---- */
function openCitationGraph(){ const topics=[...S.topics.values()].filter(t=>knowledgeOf(t.id).length).slice(0,8); citationGraphModal(topics.map(t=>t.id)); }
async function openCitationGraphSession(sid){ const s=await DB.get("research",sid); const ids=new Set();
  (s&&s.collected||[]).forEach(it=>{ if(it.type==="topic")ids.add(it.id); if(it.type==="knowledge"){const b=S.knowledge.get(it.id);if(b)ids.add(b.topicId);} });
  citationGraphModal([...ids].slice(0,10)); }
function citationGraphModal(topicIds){ const hi=rhi();
  if(!topicIds.length){ modal(`<h2>🕸 ${hi?"उद्धरण ग्राफ़":"Citation Graph"}</h2><div class="empty-hint">${hi?"उद्धरण दिखाने हेतु पहले ज्ञान ब्लॉक व स्रोत जोड़ें।":"Add knowledge blocks with sources to populate the citation graph."}</div>`); return; }
  const rows=[]; let edges=0;
  topicIds.forEach(tid=>{ const t=topic(tid); if(!t)return; const blocks=knowledgeOf(tid);
    rows.push(`<div class="cg-topic"><div class="cg-node cg-t">${ticon(t)} ${esc(t.title)}</div><div class="cg-blocks">${
      blocks.length?blocks.map(b=>{ const srcs=[...new Set([...(b.sources||[]).map(r=>r.sourceId),...(b.evidence||[]).map(e=>e.sourceId)].filter(Boolean))];
        edges+=srcs.length;
        return `<div class="cg-row"><div class="cg-node cg-k">🧩 ${esc((b.statement||"").slice(0,60))}</div><div class="cg-arrow">→</div><div class="cg-srcs">${srcs.length?srcs.map(sid=>{const s=source(sid);return `<span class="cg-node cg-s" onclick="openSourceDoc('${sid}')">📖 ${esc(s?s.title:"?")}</span>`;}).join(""):`<span class="cg-node cg-none">${hi?"बिना स्रोत":"no source"}</span>`}</div></div>`;}).join("")
      :`<div class="cg-row"><span class="cg-node cg-none">${hi?"कोई ज्ञान ब्लॉक नहीं":"no knowledge blocks"}</span></div>`}</div></div>`); });
  modal(`<h2>🕸 ${hi?"उद्धरण ग्राफ़":"Citation Graph"}</h2><p class="msub">${hi?"विषय → ज्ञान → स्रोत":"Topic → Knowledge → Source"} · ${edges} ${hi?"उद्धरण":"citations"}</p><div class="cg-wrap">${rows.join("")}</div>`);
}

/* ---- Research Report generation ---- */
async function generateReport(sid){ const s=await DB.get("research",sid); if(!s)return; const hi=rhi();
  const q=s.questionId?await DB.get("questions",s.questionId):null;
  const blocks=(s.collected||[]).filter(x=>x.type==="knowledge").map(x=>S.knowledge.get(x.id)).filter(Boolean);
  const topics=(s.collected||[]).filter(x=>x.type==="topic").map(x=>topic(x.id)).filter(Boolean);
  const srcIds=new Set(); blocks.forEach(b=>(b.sources||[]).forEach(r=>srcIds.add(r.sourceId)));
  (s.collected||[]).filter(x=>x.type==="source").forEach(x=>srcIds.add(x.id));
  const cite=b=>{ const r=(b.sources||[])[0]; if(!r)return""; const sc=source(r.sourceId); return sc?` [${sc.title}${r.locator?" · "+r.locator:""}]`:""; };
  let md=`# ${q?q.text:s.name}\n\n*${hi?"स्थिति":"Status"}: ${q?q.status:"—"} · ${new Date().toLocaleDateString()}*\n\n`;
  md+=`## ${hi?"निष्कर्ष":"Findings"}\n\n${(s.findings||"").replace(/<[^>]+>/g," ").trim()||"_(none)_"}\n\n`;
  md+=`## ${hi?"प्रमाण":"Evidence"}\n\n${blocks.length?blocks.map(b=>`- ${b.statement}${cite(b)}`).join("\n"):"_(none collected)_"}\n\n`;
  if(topics.length)md+=`## ${hi?"संबंधित विषय":"Related Topics"}\n\n${topics.map(t=>`- ${pathOf(t.id).map(x=>x.title).join(" › ")}`).join("\n")}\n\n`;
  md+=`## ${hi?"स्रोत":"Sources"}\n\n${[...srcIds].map(id=>source(id)).filter(Boolean).map(sc=>`- ${sc.title} (${sc.kind})`).join("\n")||"_(none)_"}\n\n`;
  md+=`---\n*${hi?"EKOS शोध स्टूडियो द्वारा उत्पन्न · केवल समीक्षित ज्ञान स्थायी कोर में है।":"Generated by EKOS Research Studio · only reviewed knowledge lives in the permanent Core."}*\n`;
  s.report=md; await DB.put("research",s);
  modal(`<h2>📄 ${hi?"शोध रिपोर्ट":"Research Report"}</h2>
    <textarea id="report-md" rows="16" style="font-family:monospace;font-size:12px;white-space:pre">${esc(md)}</textarea>
    <div class="row">
      <button class="btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('report-md').value);toast('${hi?"कॉपी":"Copied"}','📋')">📋 ${hi?"कॉपी":"Copy"}</button>
      <button class="btn" onclick="downloadReport('${sid}')">⬇ ${hi?"डाउनलोड .md":"Download .md"}</button>
      <button class="btn" onclick="printReport()">🖨 ${hi?"प्रिंट":"Print"}</button>
    </div>`);
}
function downloadReport(sid){ const md=$("#report-md").value; const blob=new Blob([md],{type:"text/markdown"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="research-report.md"; a.click(); }
function printReport(){ const md=$("#report-md").value; const w=window.open(); if(w){ w.document.write("<pre style='font:14px/1.6 Georgia,serif;white-space:pre-wrap;max-width:740px;margin:40px auto;padding:0 20px'>"+esc(md)+"</pre>"); w.document.title="EKOS Research Report"; w.print&&setTimeout(()=>w.print(),300); } }
/* ============================================================= *
 *  Analytics — Knowledge Analytics + Research Analytics  (Phase 6b)
 * ============================================================= */
async function openAnalytics(){ if(S.view!=="app")go("app"); await renderAnalytics(); }
async function renderAnalytics(){
  const host=$("#detail-inner"); if(!host)return; const hi=L()==="hi";
  const topics=[...S.topics.values()].filter(t=>t.id!=="root");
  const blocks=[...S.knowledge.values()];
  const evidence=blocks.reduce((n,b)=>n+((b.evidence||[]).length),0);
  const srcs=[...S.sources.values()];
  const [proposals,questions,research,conflicts]=await Promise.all([DB.getAll("proposals"),DB.getAll("questions"),DB.getAll("research"),DB.getAll("conflicts")]);
  const covered=topics.filter(t=>knowledgeOf(t.id).length>0||(t.structured&&(t.structured.description||"").trim())).length;
  const coverage=topics.length?Math.round(covered/topics.length*100):0;
  const cited=blocks.filter(b=>(b.sources&&b.sources.length)).length;
  const citationCov=blocks.length?Math.round(cited/blocks.length*100):0;

const GOV={ tab:"dashboard", auditQ:"" };

/* ---- Integrity Score (per block / per topic) ---- */
function blockIntegrity(b){
  let pts=0,max=0; const add=(ok,p)=>{max+=p; if(ok)pts+=p;};
  add((b.sources||[]).length>0,30);
  add((b.evidence||[]).length>0,20);
  add((b.principleIds||[]).length>0,10);
  add(b.confidence==="verified"||b.origin==="user",15);
  add(b.stability&&b.stability!=="unknown",10);
  add(b.status!=="proposed",15);
  return max?Math.round(pts/max*100):0;
}
function topicIntegrity(topicId){ const blocks=knowledgeOf(topicId); if(!blocks.length)return computeTrust(topicId).score;
  return Math.round(blocks.reduce((n,b)=>n+blockIntegrity(b),0)/blocks.length); }

/* ---- Integrity Rule Engine (rules are data) ---- */
function opPass(v,op,val){ if(op===">=")return v>=val; if(op==="=")return v===val; if(op==="exists")return v>=1; if(op==="none")return v===0; return true; }
async function evaluateRules(){
  const rules=(await DB.getAll("rules")).filter(r=>r.enabled);
  const confByTopic={}; (await DB.getAll("conflicts")).filter(c=>c.status==="open").forEach(c=>{confByTopic[c.topicId]=(confByTopic[c.topicId]||0)+1;});
  const out=[];
  for(const r of rules){ let total=0,passed=0;
    if(r.target==="block"){ S.knowledge.forEach(b=>{ total++; const v=r.metric==="sources"?(b.sources||[]).length:r.metric==="principles"?(b.principleIds||[]).length:(b.evidence||[]).length; if(opPass(v,r.op,r.value))passed++; }); }
    else{ [...S.topics.values()].filter(t=>t.id!=="root").forEach(t=>{ total++; let v=0;
      if(r.metric==="trust")v=computeTrust(t.id).score; else if(r.metric==="conflicts")v=confByTopic[t.id]||0;
      else if(r.metric==="covered")v=(knowledgeOf(t.id).length>0||(t.structured&&(t.structured.description||"").trim()))?1:0;
      if(opPass(v,r.op,r.value))passed++; }); }
    out.push({rule:r,total,passed,failed:total-passed}); }
  return out;
}

/* ---- Diff Viewer ---- */
function diffObjects(before,after){ const out=[]; const keys=[...new Set([...Object.keys(before||{}),...Object.keys(after||{})])];
  for(const k of keys){ if(k==="updated"||k==="version"||k==="id"||k==="created")continue;
    const a=JSON.stringify((before||{})[k]??""),b=JSON.stringify((after||{})[k]??""); if(a!==b)out.push({field:k,before:a,after:b}); }
  return out; }
async function openDiff(targetId){ const hi=L()==="hi"; const vs=await versionsFor(targetId);
  if(!vs.length){ modal(`<h2>⇄ ${hi?"डिफ़":"Diff"}</h2><div class="empty-hint">${hi?"तुलना हेतु कोई संस्करण नहीं।":"No versions to compare."}</div>`); return; }
  const cur=vs[vs.length-1], prev=vs.length>1?vs[vs.length-2]:{snapshot:{}};
  const diffs=diffObjects(prev.snapshot,cur.snapshot);
  modal(`<h2>⇄ ${hi?"संस्करण तुलना":"Version Diff"}</h2><p class="msub">${esc((cur.title||targetId).slice(0,80))} · ${hi?"पिछला बनाम वर्तमान":"previous vs current"}${cur.reason?" · "+esc(cur.reason):""}</p>
    ${diffs.length?`<div class="diff-list">${diffs.map(d=>`<div class="diff-field"><div class="diff-k">${esc(d.field)}</div><div class="diff-cols"><div class="diff-before">${esc(d.before.slice(0,300))}</div><div class="diff-after">${esc(d.after.slice(0,300))}</div></div></div>`).join("")}</div>
      <div style="display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:6px"><span>◀ ${hi?"पिछला":"previous"}</span><span>${hi?"वर्तमान":"current"} ▶</span></div>`
    :`<div class="empty-hint">${hi?"इन संस्करणों के बीच कोई अंतर नहीं।":"No differences between these versions."}</div>`}`);
}
async function restoreVersion(verId){ const v=await DB.get("versions",verId); if(!v)return; const obj=liveObject(v.kind||v.targetType,v.targetId);
  if(!obj){ toast(L()==="hi"?"लक्ष्य अब मौजूद नहीं":"Target no longer exists","⚠"); return; }

async function resolveConflict(id,action){ const c=await DB.get("conflicts",id); if(!c)return;

  c.status="resolved"; c.resolution=action; c.resolvedAt=now(); await DB.put("conflicts",c);

/* ---- Duplicate Resolution Center ---- */
function findDuplicates(){ const pairs=[]; const scan=(items,getText,type)=>{ const arr=items.slice(0,400);
    for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++){ const s=similarity(getText(arr[i]),getText(arr[j])); if(s>=0.6&&s<0.999)pairs.push({type,a:arr[i],b:arr[j],score:Math.round(s*100)}); } };
  scan([...S.topics.values()].filter(t=>t.id!=="root"),t=>t.title,"topic");
  scan([...S.knowledge.values()],b=>b.statement,"knowledge");
  scan([...S.sources.values()],s=>s.title,"source");
  scan([...S.principles.values()],p=>p.title,"principle");
  return pairs.sort((a,b)=>b.score-a.score).slice(0,40);
}
async function renderGovDuplicates(p){ const hi=L()==="hi"; const dups=findDuplicates();
  p.innerHTML=dups.length?dups.map((d,i)=>{ const t=x=>esc((x.title||x.statement||"").slice(0,70));
    return `<div class="rv-card"><div class="kb-top"><span class="kb-type">${d.type}</span><span class="kb-conf" style="color:var(--gold-700)">${d.score}%</span><span style="flex:1"></span></div>
      <div class="rv-statement">A · ${t(d.a)}</div><div class="rv-statement" style="color:var(--muted)">B · ${t(d.b)}</div>
      <div class="rv-meta">${hi?"मर्ज पूर्वावलोकन: B के संदर्भ A में जुड़ेंगे, प्रोवेनेंस सुरक्षित।":"Merge preview: B's references move into A; provenance preserved."}</div>
      <div style="display:flex;gap:6px;margin-top:8px">${can("edit")?`<button class="btn sm primary" onclick="mergeDuplicate('${d.type}','${d.a.id}','${d.b.id}')">${hi?"A में मर्ज करें":"Merge into A"}</button>`:""}<button class="btn sm ghost" onclick="openTopic('${d.type==='topic'?d.a.id:(d.a.topicId||'root')}')">${hi?"देखें":"View"}</button></div></div>`; }).join("")
    :`<div class="empty-hint" style="color:var(--muted);background:none;border-color:var(--line)">${hi?"कोई डुप्लिकेट उम्मीदवार नहीं।":"No duplicate candidates found."}</div>`;
}
async function mergeDuplicate(type,keepId,dropId){ const hi=L()==="hi";
  if(type==="knowledge"){ const a=S.knowledge.get(keepId),b=S.knowledge.get(dropId); if(a&&b){ a.sources=[...new Map([...(a.sources||[]),...(b.sources||[])].map(r=>[r.sourceId+"|"+r.locator,r])).values()];
      a.evidence=[...(a.evidence||[]),...(b.evidence||[])]; a.principleIds=[...new Set([...(a.principleIds||[]),...(b.principleIds||[])])]; await saveBlock(a,"merge dup"); S.knowledge.delete(b.id); await DB.del("knowledge",b.id); } }
  else if(type==="source"){ S.knowledge.forEach(b=>{ let ch=false; (b.sources||[]).forEach(r=>{if(r.sourceId===dropId){r.sourceId=keepId;ch=true;}}); (b.evidence||[]).forEach(e=>{if(e.sourceId===dropId){e.sourceId=keepId;ch=true;}}); if(ch)saveBlock(b,"merge source"); }); S.sources.delete(dropId); await DB.del("sources",dropId); }
  else if(type==="principle"){ S.knowledge.forEach(b=>{ if((b.principleIds||[]).includes(dropId)){ b.principleIds=[...new Set(b.principleIds.map(x=>x===dropId?keepId:x))]; saveBlock(b,"merge principle"); } }); S.principles.delete(dropId); await DB.del("principles",dropId); }
  else if(type==="topic"){ children(dropId).forEach(c=>{c.parentId=keepId;saveTopic(c,false);}); knowledgeOf(dropId).forEach(b=>{b.topicId=keepId;saveBlock(b,"merge topic");}); S.topics.delete(dropId); await DB.del("topics",dropId); }
  await addAudit({action:"duplicate merged",targetType:type,targetId:keepId,by:CURRENT_ROLE,reason:"merged "+dropId});
  toast(hi?"मर्ज पूर्ण — प्रोवेनेंस सुरक्षित":"Merged — provenance preserved","🔗"); renderTree&&renderTree(); renderGovTab();
}

/* ---- Dependency + Broken-link Monitor ---- */
function runIntegrityChecks(){ const issues=[];
  S.knowledge.forEach(b=>{
    if(!topic(b.topicId))issues.push({sev:"FAIL",type:"orphan",msg:`Orphan block "${(b.statement||'').slice(0,40)}" → missing topic`,fix:{kind:"reassignBlock",id:b.id}});
    (b.sources||[]).forEach(r=>{ if(!S.sources.get(r.sourceId))issues.push({sev:"FAIL",type:"broken-source",msg:`Block cites missing source`,fix:{kind:"dropSourceRef",id:b.id,sourceId:r.sourceId}}); });
    (b.principleIds||[]).forEach(pid=>{ if(!S.principles.get(pid))issues.push({sev:"INFO",type:"missing-principle",msg:`Block links missing principle`,fix:{kind:"dropPrincipleRef",id:b.id,pid}}); });
  });
  S.sources.forEach(s=>{ if(s.fileId&&!S.files.get(s.fileId))issues.push({sev:"WARNING",type:"missing-file",msg:`Source "${esc(s.title)}" → missing file`,fix:{kind:"clearFileId",id:s.id}}); });
  S.threads.forEach((e,i)=>{ if(!topic(e.a)||!topic(e.b))issues.push({sev:"WARNING",type:"broken-rel",msg:`Relationship → missing topic`,fix:{kind:"dropThread",idx:i}}); });
  // circular topic dependency
  S.topics.forEach(t=>{ let seen=new Set(),cur=t,guard=0; while(cur&&cur.parentId&&guard++<60){ if(seen.has(cur.id)){issues.push({sev:"FAIL",type:"cycle",msg:`Circular parent chain at "${esc(t.title)}"`,fix:null});break;} seen.add(cur.id); cur=topic(cur.parentId); } });
  return issues;
}
async function renderGovMonitor(p){ const hi=L()==="hi"; const issues=runIntegrityChecks();
  const cnt={FAIL:0,WARNING:0,INFO:0}; issues.forEach(i=>cnt[i.sev]++);
  // cascading impact (sources with downstream knowledge)
  const cascade=[...S.sources.values()].map(s=>({s,imp:sourceImpact(s.id)})).filter(x=>x.imp.blocks>0).slice(0,12);
  p.innerHTML=`<div class="rv-stats">${rvStat(cnt.FAIL,"FAIL","#c0392b")}${rvStat(cnt.WARNING,"WARNING","#c9871f")}${rvStat(cnt.INFO,"INFO","#5f7065")}${rvStat(issues.length===0?"✓":issues.length,hi?"कुल समस्याएँ":"total issues","#3c8a52")}</div>
    <div class="section-label">${hi?"निर्भरता व टूटे-लिंक मॉनिटर":"Dependency & Broken-link Monitor"}</div>
    <div class="q-list">${issues.length?issues.slice(0,80).map((it,i)=>`<div class="mon-row"><span class="mon-sev ${it.sev.toLowerCase()}">${SEV_ICON[it.sev]||""} ${it.sev}</span><span class="mon-msg">${esc(it.msg)}</span>${it.fix?`<button class="btn sm" onclick="autoFix(${i})">🛠 ${hi?"ऑटो-फिक्स":"Auto-fix"}</button>`:`<span style="font-size:12px;color:var(--muted)">${hi?"मैनुअल":"manual"}</span>`}</div>`).join("")
      :`<div class="empty-hint" style="color:var(--muted);background:none;border-color:var(--line)">✓ ${hi?"कोई समस्या नहीं — कोर अखंड है।":"No issues — the Core is intact."}</div>`}</div>
    ${cascade.length?`<div class="section-label">${hi?"कैस्केडिंग प्रभाव (स्रोत परिवर्तन)":"Cascading impact (source changes)"}</div>
      <div class="q-list">${cascade.map(c=>`<div class="q-card"><div class="q-top"><b>📖 ${esc(c.s.title)}</b><span class="q-status" style="background:rgba(58,114,196,.14);color:#3a72c4">${c.imp.blocks} ${hi?"ब्लॉक":"blocks"} · ${c.imp.topics} ${hi?"विषय":"topics"}</span></div><div class="q-meta">${hi?"बदलने पर समीक्षा आवश्यक — कुछ भी स्वतः नहीं बदलता।":"Editing requires review — nothing updates automatically."}</div></div>`).join("")}</div>`:""}
    ${_undoFix?`<div style="margin-top:10px"><button class="btn sm" onclick="undoLastFix()">↩ ${hi?"अंतिम फिक्स पूर्ववत":"Undo last fix"}: ${esc(_undoFix.label)}</button></div>`:""}`;
  window._monIssues=issues;
}
/* ---- Auto-Fix engine (preview → confirm → apply → undo + audit) ---- */
let _undoFix=null;
function autoFix(i){ const it=(window._monIssues||[])[i]; if(!it||!it.fix)return; const hi=L()==="hi"; const f=it.fix;
  const desc={ dropSourceRef:hi?"ब्लॉक से लटकता स्रोत-संदर्भ हटाया जाएगा":"Remove the dangling source reference from the block",
    dropPrincipleRef:hi?"लटकता सिद्धांत-लिंक हटाया जाएगा":"Remove the dangling principle link",
    clearFileId:hi?"स्रोत से अमान्य फ़ाइल-लिंक हटाया जाएगा":"Clear the invalid file link on the source",
    dropThread:hi?"अमान्य संबंध हटाया जाएगा":"Remove the invalid relationship",
    reassignBlock:hi?"अनाथ ब्लॉक रूट में पुनः नियुक्त होगा":"Reassign the orphan block to the root"}[f.kind]||"Apply fix";
  modal(`<h2>🛠 ${hi?"ऑटो-फिक्स":"Auto-fix"}</h2><p class="msub">${esc(it.msg)}</p>
    <div class="dep-warn" style="background:rgba(60,138,82,.08);border-color:rgba(60,138,82,.3);color:var(--forest-800)">${esc(desc)}.<br><b>${hi?"सुरक्षित:":"Safe:"}</b> ${hi?"केवल अमान्य संदर्भ हटाता है; ज्ञान नहीं हटता। पूर्ववत समर्थित।":"only removes an invalid reference; no knowledge is deleted. Undo supported."}</div>
    <div class="row"><button class="btn" onclick="closeModal()">${hi?"रद्द":"Cancel"}</button><button class="btn primary" onclick="applyFix(${i})">✓ ${hi?"लागू करें":"Apply"}</button></div>`);
}
async function applyFix(i){ const it=(window._monIssues||[])[i]; if(!it||!it.fix)return; const f=it.fix; let undo=null;
  if(f.kind==="dropSourceRef"){ const b=S.knowledge.get(f.id); if(b){ const before=JSON.parse(JSON.stringify(b.sources||[])); b.sources=(b.sources||[]).filter(r=>r.sourceId!==f.sourceId); await saveBlock(b,"autofix:dropSourceRef"); undo={label:"source ref",fn:async()=>{b.sources=before;await saveBlock(b,"undo");}}; } }
  else if(f.kind==="dropPrincipleRef"){ const b=S.knowledge.get(f.id); if(b){ const before=[...(b.principleIds||[])]; b.principleIds=(b.principleIds||[]).filter(x=>x!==f.pid); await saveBlock(b,"autofix:dropPrincipleRef"); undo={label:"principle link",fn:async()=>{b.principleIds=before;await saveBlock(b,"undo");}}; } }
  else if(f.kind==="clearFileId"){ const s=S.sources.get(f.id); if(s){ const before=s.fileId; s.fileId=null; await saveSource(s,"autofix:clearFileId"); undo={label:"file link",fn:async()=>{s.fileId=before;await saveSource(s,"undo");}}; } }
  else if(f.kind==="dropThread"){ const before=S.threads[f.idx]; S.threads.splice(f.idx,1); await DB.put("meta",{key:"threads",list:S.threads}); rebuildThreadIndex(); undo={label:"relationship",fn:async()=>{S.threads.splice(f.idx,0,before);await DB.put("meta",{key:"threads",list:S.threads});rebuildThreadIndex();}}; }
  else if(f.kind==="reassignBlock"){ const b=S.knowledge.get(f.id); if(b){ const before=b.topicId; b.topicId="root"; await saveBlock(b,"autofix:reassignBlock"); undo={label:"block topic",fn:async()=>{b.topicId=before;await saveBlock(b,"undo");}}; } }
  _undoFix=undo; await addAudit({action:"auto-fix executed",targetType:it.type,by:CURRENT_ROLE,reason:f.kind});

    appVersion:EKOS.version, build:EKOS.build, dbVersion:DB.version, schemaVersion:DB.version, migrationVersion:DB.version,

  const delta=(key)=>{ const a=setIds(A.data[key]),b=setIds(B.data[key]); let added=0,removed=0; b.forEach(id=>{if(!a.has(id))added++;}); a.forEach(id=>{if(!b.has(id))removed++;}); return {added,removed}; };
  const rows=[["topics",hi?"विषय":"Topics"],["knowledge",hi?"ज्ञान":"Knowledge"],["sources",hi?"स्रोत":"Sources"],["principles",hi?"सिद्धांत":"Principles"],["threads",hi?"संबंध":"Relationships"]]
    .map(([k,lbl])=>{ const d=delta(k); return `<div class="cmp-row"><span class="cmp-k">${lbl}</span><span class="cmp-a">${(A.stats&&A.stats[k==='threads'?'relationships':k])??(A.data[k]||[]).length}</span><span class="cmp-arrow">→</span><span class="cmp-b">${(B.data[k]||[]).length}</span><span class="cmp-delta">${d.added?`<span class="add">+${d.added}</span>`:""}${d.removed?`<span class="rem">−${d.removed}</span>`:""}</span></div>`; }).join("");

/* ---- Certification (human-only; KG-4) with history ---- */
async function certLevelOf(topicId){ const certs=(await DB.getAll("certifications")).filter(c=>c.targetId===topicId&&c.targetType==="topic").sort((a,b)=>b.date-a.date); return certs[0]?certs[0].level:null; }
async function certify(topicId,level,notes){ if(!can("certify")){toast(L()==="hi"?"प्रमाणन अनुमति नहीं":"No certification permission","🔒");return;}
  const t=topic(topicId); if(!t)return; const tr=computeTrust(topicId); const integ=topicIntegrity(topicId); const blocks=knowledgeOf(topicId);
  const cert={ id:nid("cert"), targetId:topicId, targetType:"topic", level, reviewer:CURRENT_ROLE, date:now(),
    snapshotId:null, trust:tr.score, integrity:integ, evidenceCount:blocks.reduce((n,b)=>n+((b.evidence||[]).length),0), relationshipCount:threadsOf(topicId).length, notes:notes||"" };
  await DB.put("certifications",cert);
  await addAudit({action:"certified · "+level,targetType:"topic",targetId:topicId,by:CURRENT_ROLE,reason:notes||CERT_LABEL[level]});
  await DB.put("events",{id:nid("evt"),date:now(),type:"version",title:"Certified "+(t.title)+" · "+CERT_LABEL[level],topicId});

/* ---- Readiness (breakdown by category, not one number) ---- */
function publicationReadiness(topicId){ const blocks=knowledgeOf(topicId); const t=topic(topicId)||{}; const s=t.structured||{};
  const hasK=(blocks.length||((s.description||"").trim()))?100:0;
  const evi=blocks.length?Math.round(blocks.filter(b=>(b.evidence||[]).length).length/blocks.length*100):((s.research||[]).length?80:0);
  const src=blocks.length?Math.round(blocks.filter(b=>(b.sources||[]).length).length/blocks.length*100):0;
  const integ=topicIntegrity(topicId);
  return { knowledge:hasK, evidence:evi, sources:src, governance:integ, overall:0 }; }
async function publicationReadinessFull(topicId){ const r=publicationReadiness(topicId);
  const lvl=await certLevelOf(topicId); r.certification={draft:20,reviewed:40,verified:70,scientific:90,gold:100}[lvl]||0;
  r.overall=Math.round((r.knowledge+r.evidence+r.sources+r.governance+r.certification)/5); return r; }
async function researchReadiness(topicId){ const hi=L()==="hi";
  const blocks=knowledgeOf(topicId);
  const conflicts=(await DB.getAll("conflicts")).filter(c=>c.status==="open"&&c.topicId===topicId).length;
  const srcSet=new Set(); blocks.forEach(b=>(b.sources||[]).forEach(x=>srcSet.add(x.sourceId)));
  const questions=(await DB.getAll("questions"));
  const openQ=questions.filter(q=>(q.topicIds||[]).includes(topicId)&&q.status!=="answered").length;
  return { conflictsResolved:conflicts===0?100:Math.max(0,100-conflicts*40), independentValidation:srcSet.size>=2?100:srcSet.size*50,
    evidenceGaps:blocks.filter(b=>(b.evidence||[]).length).length?100:0, openQuestions:openQ===0?100:Math.max(0,100-openQ*25), overall:0 }; }
async function renderGovReadiness(p){ const hi=L()==="hi";

  const pub=await publicationReadinessFull(t.id); const res=await researchReadiness(t.id);
  res.overall=Math.round((res.conflictsResolved+res.independentValidation+res.evidenceGaps+res.openQuestions)/4);
